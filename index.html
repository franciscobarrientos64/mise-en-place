/* ══ PAIRINGS LAB ══ */

function PairingsLab({recipes}){
  const MONTH=new Date().getMonth()+1;
  const[INGS,setINGS]=useState([]);
  const[ingsLoading,setIngsLoading]=useState(true);
  useEffect(()=>{
    loadIngredients().then(rows=>{
      setINGS(rows.map(r=>({name:r.name,cat:r.category,season:r.season||[],origin:r.origin||"global"})));
      setIngsLoading(false);
    }).catch(()=>setIngsLoading(false));
  },[]);

  const getSeasonStatus = (season) => {
    if(season.length===0) return "year_round";
    return season.includes(MONTH) ? "in_season" : "out_season";
  };

  const SEASON_META = {
    in_season:  {icon:"🌱", label:"En temporada",    color:"#059669", bg:"#ECFDF5", border:"#6EE7B7"},
    year_round: {icon:"♾️", label:"Atemporal",        color:"#6366F1", bg:"#EEF2FF", border:"#A5B4FC"},
    out_season: {icon:"🌙", label:"Fuera de temporada",color:"#9CA3AF", bg:"#F9FAFB", border:"#E5E7EB"},
  };

  // ── Count ingredient usage from user recipes ───────────────────────
  const usageCount = React.useMemo(()=>{
    const counts = {};
    (recipes||[]).forEach(r=>(r.steps||[]).forEach(s=>(s.ingredients||[]).forEach(ing=>{
      const key=ing.name.toLowerCase().trim();
      counts[key]=(counts[key]||0)+1;
    })));
    return counts;
  },[recipes]);

  const getUsage = (name) => usageCount[name.toLowerCase().trim()]||0;

  // ── State ──────────────────────────────────────────────────────────
  const[filter,setFilter]=useState("all");        // all | in_season | year_round | out_season
  const[catFilter,setCatFilter]=useState("all");
  const[searchQ,setSearchQ]=useState("");
  const[selected,setSelected]=useState(null);     // selected ingredient for pairings
  const[pairings,setPairings]=useState([]);
  const[pLoading,setPLoading]=useState(false);
  const[genLoading,setGenLoading]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[newPair,setNewPair]=useState({pairs_with:"",score:7,compounds:"",notes:""});

  // ── Filter ingredients ─────────────────────────────────────────────
  const cats = ["all",...[...new Set(INGS.map(i=>i.cat))]];
  const displayed = INGS
    .filter(i=> filter==="all" || getSeasonStatus(i.season)===filter)
    .filter(i=> catFilter==="all" || i.cat===catFilter)
    .filter(i=> !searchQ || i.name.toLowerCase().includes(searchQ.toLowerCase()))
    .sort((a,b)=> getUsage(b.name)-getUsage(a.name) || a.name.localeCompare(b.name,"es"));

  // ── Load pairings for selected ingredient ──────────────────────────
  const selectIngredient = async(name)=>{
    setSelected(name);
    setPLoading(true);
    const rows=await loadPairings(name);
    setPairings(rows);
    setPLoading(false);
  };

  const generatePairings=async()=>{
    if(!selected)return;
    setGenLoading(true);
    try{
      const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,
          system:"Eres experto en food pairing y química culinaria. Conoces a fondo Niki Segnit (The Flavour Thesaurus), François Chartier (Papilles et Molécules) y FlavorGraph (Nature 2021). Responde SOLO con JSON válido.",
          messages:[{role:"user",content:"Genera los 10 mejores food pairings para: \""+selected+"\"\n\nIncluye pairings clásicos, sorprendentes y basados en compuestos químicos compartidos. Prioriza ingredientes usados en cocina peruana y latinoamericana. Responde SOLO este JSON:\n[{\"pairs_with\":\"nombre\",\"score\":8,\"compounds\":[\"compuesto1\",\"compuesto2\"],\"notes\":\"explicación breve en español\"}]"}]})});
      const data=await res.json();
      const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
      const m=raw.match(/\[[\s\S]*\]/);
      const ps=JSON.parse(m?m[0]:raw);
      for(const p of ps) await savePairing({...p,ingredient:selected,compounds:p.compounds||[],source:"ai"});
      const fresh=await loadPairings(selected);
      setPairings(fresh);
    }catch(e){alert("Error: "+e.message);}
    setGenLoading(false);
  };

  const addManual=async()=>{
    if(!newPair.pairs_with.trim()||!selected)return;
    await savePairing({ingredient:selected,pairs_with:newPair.pairs_with.trim(),score:+newPair.score,compounds:newPair.compounds?newPair.compounds.split(",").map(s=>s.trim()).filter(Boolean):[],notes:newPair.notes,source:"user"});
    const fresh=await loadPairings(selected);
    setPairings(fresh);
    setNewPair({pairs_with:"",score:7,compounds:"",notes:""});
    setShowAdd(false);
  };

  const MONTHS_ES=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const mob=useMobile();

  return(
    <div style={{fontFamily:FB,maxWidth:1100,margin:"0 auto"}}>
      <div style={{display:"flex",gap:mob?12:28,alignItems:"flex-start",flexDirection:mob?"column":"row"}}>

        {/* ── LEFT: Ingredient browser ────────────────────────────── */}
        <div style={{flex:"0 0 auto",width:mob?"100%":340}}>
          <h3 style={{fontFamily:FH,fontSize:16,color:G.text,margin:"0 0 14px"}}>Ingredientes</h3>

          {/* Season legend */}
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {Object.entries(SEASON_META).map(([k,m])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:m.color,fontWeight:600}}>
                <span>{m.icon}</span><span>{m.label}</span>
              </div>
            ))}
          </div>

          {/* Search + filters */}
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Buscar ingrediente…"
            style={{...inp({width:"100%",fontSize:12,padding:"8px 12px",boxSizing:"border-box",borderRadius:8}),marginBottom:8}}
            onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>

          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
            {[["all","Todos"],["in_season","🌱"],["year_round","♾️"],["out_season","🌙"]].map(([k,l])=>(
              <button key={k} onClick={()=>setFilter(k)}
                style={{fontSize:10,padding:"4px 10px",borderRadius:20,border:`1px solid ${filter===k?G.blue:G.brd}`,background:filter===k?G.blueTint:G.w,color:filter===k?G.blue:G.textMut,cursor:"pointer",fontFamily:FB,fontWeight:filter===k?700:400}}>
                {l}
              </button>
            ))}
          </div>

          <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
            {cats.map(cat=>(
              <button key={cat} onClick={()=>setCatFilter(cat)}
                style={{fontSize:9,padding:"3px 8px",borderRadius:20,border:`1px solid ${catFilter===cat?G.blue:G.brd}`,background:catFilter===cat?G.blueTint:G.w,color:catFilter===cat?G.blue:G.textMut,cursor:"pointer",fontFamily:FB}}>
                {cat==="all"?"Todas":cat}
              </button>
            ))}
          </div>

          {/* Ingredient grid */}
          <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:mob?260:580,overflowY:"auto",paddingRight:4}}>
            {ingsLoading&&<p style={{fontSize:12,color:G.textMut,textAlign:"center",padding:16}}>Cargando ingredientes…</p>}
          {!ingsLoading&&displayed.map(ing=>{
              const status=getSeasonStatus(ing.season);
              const meta=SEASON_META[status];
              const usage=getUsage(ing.name);
              const isSelected=selected===ing.name;
              return(
                <button key={ing.name} onClick={()=>selectIngredient(ing.name)}
                  style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,
                    border:`1px solid ${isSelected?G.blue:G.brd}`,
                    background:isSelected?G.blueTint:G.w,
                    cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%"}}
                  onMouseOver={e=>{if(!isSelected){e.currentTarget.style.background=G.surf;e.currentTarget.style.borderColor=G.brdL;}}}
                  onMouseOut={e=>{if(!isSelected){e.currentTarget.style.background=G.w;e.currentTarget.style.borderColor=G.brd;}}}>
                  {/* Season icon */}
                  <span style={{fontSize:13,flexShrink:0}}>{meta.icon}</span>
                  {/* Name + category */}
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:12,color:isSelected?G.blue:G.text,fontWeight:isSelected?700:500}}>{ing.name}</span>
                    <span style={{fontSize:9,color:G.textMut,marginLeft:6}}>{ing.cat}</span>
                  </div>
                  {/* Usage stars */}
                  {usage>0&&<div style={{flexShrink:0,display:"flex",alignItems:"center",gap:2}}>
                    <span style={{fontSize:9,color:"#F59E0B",fontWeight:700}}>{"★".repeat(Math.min(usage,3))}</span>
                    {usage>1&&<span style={{fontSize:8,color:G.textMut}}>{usage}</span>}
                  </div>}
                </button>
              );
            })}
          </div>
          <p style={{fontSize:9,color:G.brd,marginTop:8,textAlign:"right"}}>{displayed.length} ingredientes · {MONTHS_ES[MONTH]}</p>
        </div>

        {/* ── RIGHT: Pairings panel ────────────────────────────────── */}
        <div style={{flex:1,minWidth:0}}>
          {!selected&&<div style={{textAlign:"center",padding:"64px 0",color:G.textMut}}>
            <span style={{fontSize:40}}>🔬</span>
            <p style={{fontSize:14,marginTop:12}}>Selecciona un ingrediente para ver sus pairings</p>
            <p style={{fontSize:11,marginTop:6,color:G.brd}}>Los pairings se generan con IA basada en FlavorGraph, Segnit y Chartier</p>
          </div>}

          {selected&&(
            <div>
              {/* Header */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <h3 style={{fontFamily:FH,fontSize:20,color:G.text,margin:0}}>{selected}</h3>
                    {getUsage(selected)>0&&<span style={{fontSize:11,background:"#FEF3C7",color:"#92400E",padding:"2px 8px",borderRadius:20,fontWeight:700}}>⭐ Usas este ingrediente</span>}
                  </div>
                  <p style={{fontSize:11,color:G.textMut,margin:"4px 0 0"}}>{pairings.length} pairings guardados</p>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowAdd(p=>!p)} style={bv("ghost",{fontSize:11,padding:"7px 14px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>+ Agregar</button>
                  <button onClick={generatePairings} disabled={genLoading} style={bv("p",{fontSize:11,padding:"7px 14px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
                    {genLoading?"Generando…":"✦ Generar con IA"}
                  </button>
                </div>
              </div>

              {/* Manual add form */}
              {showAdd&&<div style={{background:G.surf,border:`1px solid ${G.brd}`,borderRadius:10,padding:"16px",marginBottom:16}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 70px",gap:8,marginBottom:8}}>
                  <input value={newPair.pairs_with} onChange={e=>setNewPair(p=>({...p,pairs_with:e.target.value}))} placeholder="Ingrediente que combina con" style={inp({fontSize:12,padding:"7px 10px"})} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
                  <input type="number" min="1" max="10" value={newPair.score} onChange={e=>setNewPair(p=>({...p,score:e.target.value}))} placeholder="Score" style={inp({fontSize:12,padding:"7px 10px"})} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
                </div>
                <input value={newPair.compounds} onChange={e=>setNewPair(p=>({...p,compounds:e.target.value}))} placeholder="Compuestos compartidos (opcional, separar con coma)" style={{...inp({fontSize:12,padding:"7px 10px",width:"100%",boxSizing:"border-box"}),marginBottom:8}} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
                <input value={newPair.notes} onChange={e=>setNewPair(p=>({...p,notes:e.target.value}))} placeholder="Nota de maridaje (opcional)" style={{...inp({fontSize:12,padding:"7px 10px",width:"100%",boxSizing:"border-box"}),marginBottom:12}} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={addManual} style={bv("p",{fontSize:12,padding:"7px 16px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>Guardar</button>
                  <button onClick={()=>setShowAdd(false)} style={bv("ghost",{fontSize:12,padding:"7px 16px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>Cancelar</button>
                </div>
              </div>}

              {pLoading&&<p style={{color:G.textMut,fontSize:13,textAlign:"center",padding:24}}>Cargando pairings…</p>}

              {!pLoading&&pairings.length===0&&<div style={{textAlign:"center",padding:"32px",background:G.surf,borderRadius:10,border:`1px solid ${G.brd}`}}>
                <p style={{fontSize:13,color:G.textMut,marginBottom:16}}>Sin pairings guardados para {selected}.</p>
                <button onClick={generatePairings} disabled={genLoading} style={bv("p",{padding:"10px 24px",fontSize:13,borderRadius:8})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
                  {genLoading?"Generando…":"✦ Generar 10 pairings con IA"}
                </button>
              </div>}

              {!pLoading&&pairings.length>0&&(
                <div style={{display:"grid",gap:10,gridTemplateColumns:mob?"1fr":"1fr 1fr"}}>
                  {pairings.map(p=>{
                    const pStatus=getSeasonStatus((INGS.find(i=>i.name.toLowerCase()===p.pairs_with.toLowerCase())?.season)||[]);
                    const pMeta=SEASON_META[pStatus];
                    const scoreColor=p.score>=8?"#059669":p.score>=6?"#D97706":"#6B7280";
                    return(
                      <div key={p.id} style={{background:G.w,border:`1px solid ${G.brd}`,borderRadius:10,padding:"12px 14px",transition:"box-shadow .15s"}}
                        onMouseOver={e=>e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.08)"}
                        onMouseOut={e=>e.currentTarget.style.boxShadow="none"}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:12}}>{pMeta.icon}</span>
                            <span style={{fontFamily:FH,fontSize:14,color:G.text,fontWeight:700}}>{p.pairs_with}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:10,color:p.source==="user"?"#7C3AED":"#1B4FD8",background:p.source==="user"?"#EDE9FE":"#EFF6FF",padding:"1px 7px",borderRadius:20,fontWeight:600}}>{p.source==="user"?"👤":"✦ IA"}</span>
                            <span style={{fontSize:16,fontWeight:800,color:scoreColor}}>{p.score}</span>
                          </div>
                        </div>
                        {p.compounds?.length>0&&<p style={{fontSize:10,color:"#6366F1",margin:"0 0 4px",lineHeight:1.4}}>🧪 {p.compounds.join(" · ")}</p>}
                        {p.notes&&<p style={{fontSize:11,color:G.textMid,margin:0,lineHeight:1.5}}>{p.notes}</p>}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function FlavorLab({recipes, onAddRecipe, onOpenRecipes}){
  const[labTab,setLabTab]=useState("wheel"); // wheel | need
  const[selected,setSelected]=useState([]);
  const[hoverIng,setHoverIng]=useState(null);
  const[activePair,setActivePair]=useState(null);
  const[concept,setConcept]=useState(null);
  const[loading,setLoading]=useState(false);
  const[mode,setMode]=useState("todo");
  const[activeCat,setActiveCat]=useState(null);
  const[catSearch,setCatSearch]=useState("");
  const[customIngs,setCustomIngs]=useState({});

  const addCustomIng=(sectorId,name)=>{
    const n=name.trim(); if(!n)return;
    setCustomIngs(p=>({...p,[sectorId]:[...(p[sectorId]||[]),n]}));
    setSelected(p=>p.includes(n)?p:p.length<8?[...p,n]:p);
  };
  // Zoom & pan
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const dragRef=useRef({active:false,startX:0,startY:0,startPanX:0,startPanY:0});
  // Recipe builder — 3 modes: free | repo | web
  const[builderMode,setBuilderMode]=useState("free");
  const[freeInput,setFreeInput]=useState("");
  const[freeList,setFreeList]=useState([]);
  const[selRecipeId,setSelRecipeId]=useState("");
  // Web search
  const[webQuery,setWebQuery]=useState("");
  const[selSources,setSelSources]=useState(["nyt","serious","epicur","bonapp","nestle"]);
  const[webResults,setWebResults]=useState([]);
  const[webLoading,setWebLoading]=useState(false);
  const[webError,setWebError]=useState("");
  const[showSources,setShowSources]=useState(false);
  // Ingredients from web result
  const[webIngList,setWebIngList]=useState([]);

  const toggle=name=>{setSelected(p=>p.includes(name)?p.filter(x=>x!==name):p.length<8?[...p,name]:p);setActivePair(null);};
  const BAR_IDS=["spirits","bar"];
  const knownPairs=[];
  for(let i=0;i<selected.length;i++)for(let j=i+1;j<selected.length;j++){const aff=getAff(selected[i],selected[j]);if(aff)knownPairs.push({a:selected[i],b:selected[j],aff});}

  // Zoom/pan handlers
  const onWheel=e=>{e.preventDefault();const d=e.deltaY>0?0.85:1.15;setZoom(z=>Math.min(4,Math.max(0.4,z*d)));};
  const onMouseDown=e=>{dragRef.current={active:true,startX:e.clientX,startY:e.clientY,startPanX:pan.x,startPanY:pan.y};};
  const onMouseMove=e=>{if(!dragRef.current.active)return;setPan({x:dragRef.current.startPanX+e.clientX-dragRef.current.startX,y:dragRef.current.startPanY+e.clientY-dragRef.current.startY});};
  const onMouseUp=()=>{dragRef.current.active=false;};
  const resetView=()=>{setZoom(1);setPan({x:0,y:0});};

  // Free ingredients
  const addFreeIng=()=>{if(!freeInput.trim())return;setFreeList(p=>[...p,freeInput.trim()]);setFreeInput("");};

  // Repo ingredients
  const selRecipe=recipes.find(r=>r.id===selRecipeId);
  const recipeIngs=selRecipe?aggIng(selRecipe).map(i=>i.name):[];

  // Toggle source
  const toggleSource=id=>setSelSources(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  // Web recipe search
  const searchWeb=async()=>{
    if(!webQuery.trim())return;
    setWebLoading(true);setWebResults([]);setWebError("");
    const active=RECIPE_SOURCES.filter(s=>selSources.includes(s.id));
    const srcStr=active.length>0
      ?`Busca prioritariamente en: ${active.map(s=>`${s.name} (${s.domain})`).join(", ")}.`
      :"Busca en las mejores fuentes gastronómicas del mundo.";
    try{
      const res=await fetch(AI_URL,{
        method:"POST", headers:AHEADERS(),
        body:JSON.stringify({
          model:"claude-sonnet-4-6",max_tokens:2000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:`Eres un buscador experto de recetas gastronómicas. ${srcStr} Cuando encuentres recetas, devuelve ÚNICAMENTE un array JSON válido con este formato exacto sin texto adicional: [{"name":"nombre de la receta","source":"nombre de la fuente","url":"URL completa y válida","ingredients":["ingrediente 1","ingrediente 2","ingrediente 3","ingrediente 4","ingrediente 5"],"description":"descripción breve del plato en 1 frase"}]. Máximo 5 resultados. Responde SOLO con el JSON, sin explicaciones.`,
          messages:[{role:"user",content:`Busca recetas de: "${webQuery}"`}]
        })
      });
      const data=await res.json();
      const texts=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
      const m=texts.match(/\[[\s\S]*?\]/);
      if(m){
        const parsed=JSON.parse(m[0]);
        setWebResults(parsed);
      } else {
        setWebError("No se encontraron resultados. Prueba con otro término.");
      }
    }catch(e){setWebError("Error de búsqueda. Verifica tu conexión a internet.");}
    setWebLoading(false);
  };

  // Current builder ingredients
  const builderIngs = builderMode==="free" ? freeList
    : builderMode==="repo" ? recipeIngs
    : webIngList;

  // All ingredients for spark
  const allIngsForSpark=[...new Set([...selected,...builderIngs])];

  const generateConcept=async()=>{
    if(allIngsForSpark.length<2)return;
    setLoading(true);setConcept(null);
    const ctx=allIngsForSpark.map(name=>{const s=SECTORS.find(sec=>sec.ings.includes(name));return`${name}${s?` (familia: ${s.name})`:""}`;});
    try{
      const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,system:"Eres el asistente creativo de un chef de nivel mundial. Dominas Niki Segnit y François Chartier. Respondes SIEMPRE con JSON válido puro, sin texto extra, sin backticks. Sé conciso.",messages:[{role:"user",content:`Ingredientes: ${ctx.join(", ")}\n\nGenera 3 conceptos de alta cocina o coctelería. Responde SOLO con JSON válido (máximo 120 palabras por campo):\n[\n  {\n    "nombre": "Nombre poético",\n    "descripcion": "Una frase de la esencia",\n    "logica": "Lógica aromática molecular estilo Chartier (conciso)",\n    "tecnica": "Técnica y emplatado (conciso)"\n  }\n]`}]})});
      const data=await res.json();
      if(!res.ok){ setConcept(`Error ${res.status}: ${data?.error?.message||JSON.stringify(data)}`); setLoading(false); return; }
      const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
      // Extract JSON array, repair if truncated
      const parseJson=str=>{
        const m=str.match(/\[[\s\S]*\]/);
        if(m)try{return JSON.parse(m[0]);}catch(e){}
        // Repair truncated JSON: find last complete object
        const lastClose=str.lastIndexOf('"}');
        if(lastClose>0){try{return JSON.parse(str.slice(0,lastClose+2)+"]");}catch(e){}}
        return null;
      };
      const parsed=parseJson(raw);
      setConcept(parsed||raw||"Respuesta vacía — intenta de nuevo.");
    }catch(e){setConcept(`Error de red: ${e.message}`);}
    setLoading(false);
  };

  const affCol=t=>t==="c"?G.gold:t==="m"?G.blue:"#7C3AED";
  const affLabel=t=>t==="c"?"Clásico":t==="m"?"Molecular":"Sorprendente";

  return(
    <div style={{maxWidth:1400,margin:"0 auto",padding:"40px 32px 60px"}}>
      {/* Header + Tab switcher */}
      <div style={{marginBottom:28}}>
        <p style={{fontFamily:FB,fontSize:10,letterSpacing:3,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:8}}>Laboratorio de Sabores</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:14}}>
          <h1 style={{fontFamily:FH,fontSize:34,color:G.text,margin:0,fontWeight:700,letterSpacing:-.5}}>
            {labTab==="wheel"?"Rueda Aromática":"Desde la Necesidad"}
          </h1>
          {/* Main tabs */}
          <div style={{display:"flex",gap:0,background:G.surf,borderRadius:8,padding:3}}>
            {[["wheel","🎯 Rueda Aromática"],["need","💡 Desde la Necesidad"],["pairings","🔬 Pairings"]].map(([id,label])=>(
              <button key={id} onClick={()=>setLabTab(id)} style={{padding:"8px 16px",border:"none",borderRadius:6,background:labTab===id?G.w:"transparent",color:labTab===id?G.blue:G.textMid,cursor:"pointer",fontFamily:FB,fontSize:12,fontWeight:labTab===id?700:400,boxShadow:labTab===id?"0 1px 4px rgba(0,0,0,.08)":"none",transition:"all .15s"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── PESTAÑA: DESDE LA NECESIDAD ── */}
      {labTab==="need"&&<NecesidadLab onAddRecipe={onAddRecipe} onOpenRecipes={onOpenRecipes}/>}
      {labTab==="pairings"&&<PairingsLab recipes={recipes}/>}

      {/* ── PESTAÑA: RUEDA AROMÁTICA ── */}
      {labTab==="wheel"&&<>
      {/* Legend */}
      <div style={{display:"flex",gap:20,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        {[["c",G.gold,"Clásico"],["m",G.blue,"Molecular"],["s","#7C3AED","Sorprendente"]].map(([t,col,label])=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:G.textMid,fontFamily:FB}}>
            <div style={{width:20,height:2.5,background:col,borderRadius:2}}/>

    </div>
  );

function NecesidadLab({onAddRecipe,onOpenRecipes}){
  const[query,setQuery]=useState("");
  const[selFilters,setSelFilters]=useState([]);
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");

  const toggleF=f=>setSelFilters(p=>p.includes(f)?p.filter(x=>x!==f):[...p,f]);

  const search=async()=>{
    const q=[query.trim(),...selFilters].filter(Boolean).join(". ");
    if(!q){setError("Describe lo que necesitas o elige un filtro");return;}
    setLoading(true);setResults(null);setError("");
    try{
      const res=await fetch(AI_URL,{
        method:"POST",headers:AHEADERS(),
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,
          system:"Eres un chef experto y nutricionista. Generas sugerencias de platos creativas, prácticas y apetitosas. Respondes SOLO con JSON válido, sin texto extra.",
          messages:[{role:"user",content:`El usuario necesita: "${q}"\n\nSugiere 6 platos ideales. Responde SOLO con este JSON válido (conciso):\n[\n  {\n    "nombre": "Nombre del plato",\n    "descripcion": "Descripción apetitosa en 1 frase",\n    "categoria": "Categoría (Entradas/Carnes/Postres/etc)",\n    "dificultad": "Fácil/Media/Alta",\n    "tiempo": "XX min",\n    "porqué": "Por qué encaja perfectamente con lo que necesitas"\n  }\n]`}]})});
      const data=await res.json();
      if(!res.ok)throw new Error(data?.error?.message||"Error API");
      const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
      const m=raw.match(/\[[\s\S]*\]/);
      const parsed=JSON.parse(m?m[0]:raw);
      setResults(parsed);
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  };

  return(
    <div style={{maxWidth:1200,margin:"0 auto"}}>
      {/* Search box */}
      <div style={{border:`1px solid ${G.brd}`,borderRadius:12,padding:"22px 24px",marginBottom:24,background:G.w,boxShadow:"0 2px 12px rgba(0,0,0,.04)"}}>
        <p style={{fontFamily:FH,fontSize:20,color:G.text,margin:"0 0 6px",fontWeight:700}}>¿Qué necesitas?</p>
        <p style={{fontFamily:FB,fontSize:12,color:G.textMut,margin:"0 0 16px"}}>Describe la ocasión, para quién es, qué ingredientes tienes, o simplemente qué te apetece</p>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <textarea value={query} onChange={e=>setQuery(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),search())}
            placeholder="Ej: quiero un postre para el cumpleaños de mi hijo de 6 años, le encanta el chocolate y no puede comer nueces…"
            rows={2}
            style={{...inp({flex:1,resize:"none",fontSize:13,lineHeight:1.6,padding:"10px 14px"})}}
            onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
          <button onClick={search} disabled={loading} style={bv("p",{padding:"10px 20px",fontSize:13,borderRadius:8,alignSelf:"stretch",opacity:loading?.65:1})}
            onMouseOver={e=>{if(!loading)e.currentTarget.style.background=G.blueHov;}} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
            {loading?"Buscando…":"✦ Buscar"}
          </button>
        </div>
        {/* Quick filters */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {QUICK_FILTERS.map(({group,items})=>(
            <div key={group} style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontFamily:FB,fontSize:9,color:G.textMut,letterSpacing:1.5,textTransform:"uppercase",fontWeight:600,minWidth:70,flexShrink:0}}>{group}</span>
              {items.map(f=>{
                const on=selFilters.includes(f);
                return(
                  <button key={f} onClick={()=>toggleF(f)} style={{padding:"3px 10px",border:`1px solid ${on?G.blue:G.brd}`,borderRadius:20,background:on?G.blueTint:G.w,color:on?G.blue:G.textMid,cursor:"pointer",fontFamily:FB,fontSize:11,fontWeight:on?600:400,transition:"all .12s"}}>
                    {on?"✓ ":""}{f}
                  </button>
                );
              })}
            </div>
          ))}
        </div>
        {selFilters.length>0&&<button onClick={()=>setSelFilters([])} style={{...bv("ghost",{fontSize:10,padding:"4px 10px",borderRadius:6,marginTop:8,color:G.red,borderColor:G.red+"44"})}} onMouseOver={e=>e.currentTarget.style.background=G.red+"06"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>Limpiar filtros ({selFilters.length})</button>}
        {error&&<p style={{color:G.red,fontSize:12,fontFamily:FB,margin:"8px 0 0"}}>{error}</p>}
      </div>

      {/* Loading */}
      {loading&&<div style={{textAlign:"center",padding:"40px",color:G.textMut,fontSize:14,fontFamily:FB,fontStyle:"italic"}}>Explorando opciones culinarias…</div>}

      {/* Results */}
      {results&&(
        <div>
          <p style={{fontFamily:FB,fontSize:11,color:G.textMut,marginBottom:16}}>{results.length} sugerencias · haz clic en una para ver la receta completa</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
            {results.map((dish,i)=><DishCard key={i} dish={dish} index={i} onAddRecipe={onAddRecipe} onOpenRecipes={onOpenRecipes}/>)}
          </div>
        </div>
      )}

      {/* Empty state */}
      {!results&&!loading&&(
        <div style={{textAlign:"center",padding:"48px 0",color:G.textMut}}>
          <p style={{fontSize:36,margin:"0 0 12px"}}>💡</p>
          <p style={{fontFamily:FH,fontSize:20,color:G.text,margin:"0 0 6px",fontWeight:700}}>Describe lo que necesitas</p>
          <p style={{fontFamily:FB,fontSize:13,margin:0}}>Usa el buscador o los filtros rápidos para encontrar el plato ideal</p>
        </div>
      )}
    </div>
  );
}

/* ══ DISH CARD ══ */
function DishCard({dish,index,onAddRecipe,onOpenRecipes}){
  const[open,setOpen]=useState(false);
  const[creating,setCreating]=useState(false);
  const[saved,setSaved]=useState(false);
  const catColors={"Entradas":"#1B4FD8","Postres":"#7C3AED","Carnes":"#DC2626","Pescados & Mariscos":"#0891B2","Sopas & Caldos":"#059669","Vegetariano & Vegano":"#16A34A","Panadería & Repostería":"#D97706","Bebidas & Cócteles":"#7C3AED"};
  const col=catColors[dish.categoria]||G.blue;
  const difColor=d=>d==="Fácil"?G.green:d==="Media"?G.gold:G.red;

  const createRecipe=async()=>{
    setCreating(true);
    try{
      const res=await fetch(AI_URL,{
        method:"POST",headers:AHEADERS(),
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,
          system:"Eres un chef experto. Respondes SOLO con JSON válido, sin texto extra, sin backticks.",

      const data=await res.json();
      if(!res.ok)throw new Error(data?.error?.message||"Error API");
      const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
      const m=raw.match(/\{[\s\S]*\}/);const parsed=JSON.parse(m?m[0]:raw);
      const recipe={...parsed,id:Math.random().toString(36).substr(2,9),photo:null,colls:[],
        steps:(parsed.steps||[]).map(s=>({...s,id:Math.random().toString(36).substr(2,9),

          <div style={{flex:1}}>
            <div style={{display:"flex",gap:6,marginBottom:6,flexWrap:"wrap",alignItems:"center"}}>

          {dish.porqué&&<div style={{background:G.blueTint,border:`1px solid ${G.blue}20`,borderRadius:8,padding:"10px 14px"}}>

/* ══ CATEGORY BROWSER ══ */
function CategoryBrowser({cat,extended,custom,selected,onToggle,onClose,search,setSearch,onAddCustom}){
  const[newIng,setNewIng]=useState("");
  const filtered=extended.filter(n=>n.toLowerCase().includes(search.toLowerCase()));
  const selCount=extended.filter(n=>selected.includes(n)).length;
  const handleAdd=()=>{
    const n=newIng.trim();

    if(!extended.includes(n)) onAddCustom(n);
    else onToggle(n);
    setNewIng("");
  };
  return(
    <div style={{border:`1px solid ${cat.col}44`,borderRadius:12,overflow:"hidden",background:G.w,boxShadow:`0 2px 16px ${cat.col}18`}}>

      <div style={{padding:"12px 18px",borderBottom:`1px solid ${G.brd}`,background:cat.col+"0E",display:"flex",alignItems:"center",gap:10}}>

        <div style={{width:11,height:11,borderRadius:"50%",background:cat.col,flexShrink:0}}/>

          <p style={{fontFamily:FB,fontSize:10,color:G.textMut,margin:0}}>{extended.length} ingredientes · {selCount} seleccionados</p>
        </div>
      </div>
      {/* Search */}
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${G.brd}`,background:G.surf}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Buscar en ${cat.name}…`}
          style={inp({fontSize:12,padding:"7px 11px"})}
          onFocus={e=>e.target.style.borderColor=cat.col} onBlur={e=>e.target.style.borderColor=G.brd}/>

      <div style={{padding:"10px 14px",borderBottom:`1px solid ${G.brd}`,display:"flex",gap:6}}>
        <input value={newIng} onChange={e=>setNewIng(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()}

          style={inp({flex:1,fontSize:11,padding:"6px 10px",borderStyle:"dashed"})}
          onFocus={e=>e.target.style.borderColor=cat.col} onBlur={e=>e.target.style.borderColor=G.brd}/>
        <button onClick={handleAdd} style={bv("p",{padding:"6px 14px",fontSize:13,borderRadius:6,fontWeight:700,background:cat.col,border:"none"})}
          onMouseOver={e=>e.currentTarget.style.opacity=".85"} onMouseOut={e=>e.currentTarget.style.opacity="1"}>+</button>
      </div>
      {/* Ingredient grid */}
      <div style={{padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:6,maxHeight:"55vh",overflowY:"auto"}}>
        {/* Custom ingredients first with badge */}
        {(custom||[]).filter(n=>n.toLowerCase().includes(search.toLowerCase())).map(n=>{
          const isSel=selected.includes(n);
          return(
            <button key={`c-${n}`} onClick={()=>onToggle(n)} style={{padding:"4px 11px",border:`1px solid ${isSel?cat.col:"#D97706"}`,borderRadius:20,background:isSel?cat.col+"18":"#FFF7ED",color:isSel?cat.col:"#92400E",cursor:"pointer",fontFamily:FB,fontSize:11,fontWeight:isSel?700:500,transition:"all .15s",display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:8,opacity:.7}}>★</span>{n}{isSel&&<span style={{fontSize:9}}>✓</span>}
            </button>
          );
        })}
        {filtered.length===0&&(custom||[]).filter(n=>n.toLowerCase().includes(search.toLowerCase())).length===0&&<p style={{color:G.textMut,fontSize:12,fontFamily:FB,fontStyle:"italic"}}>Sin resultados — prueba agregarlo con el campo de arriba</p>}

          const isSel=selected.includes(n);
          return(
            <button key={n} onClick={()=>onToggle(n)} style={{padding:"4px 11px",border:`1px solid ${isSel?cat.col:G.brd}`,borderRadius:20,background:isSel?cat.col+"15":G.w,color:isSel?cat.col:G.textMid,cursor:"pointer",fontFamily:FB,fontSize:11,fontWeight:isSel?700:400,transition:"all .15s",display:"flex",alignItems:"center",gap:4}}>
              {isSel&&<span style={{fontSize:9}}>✓</span>}{n}

      </div>

      </div>}
    </div>
  );
}

/* ══ FLAVOR WHEEL SVG ══ */
function FlavorWheel({sectors,selected,hoverIng,onToggle,onHover,mode,onCatClick}){
  const TOTAL=sectors.length,DEG=360/TOTAL;
  const BAR_IDS=["spirits","bar"];
  return(
    <svg viewBox="0 0 760 760" width="100%" style={{display:"block"}}>
      {/* White background */}
      <rect x="0" y="0" width="760" height="760" fill="white"/>
      {/* Sectors */}
      {sectors.map((s,idx)=>{
        const start=idx*DEG,end=start+DEG;
        const isBar=BAR_IDS.includes(s.id);
        const dimmed=mode==="cocina"&&isBar||mode==="bar"&&!isBar;
        const hasSel=s.ings.some(n=>selected.includes(n));
        return <path key={s.id} d={slicePath(start,end)} fill={s.col} opacity={dimmed?.15:hasSel?1:.82} stroke="#fff" strokeWidth="1.2"/>;
      })}
      {/* Family labels — RADIAL (perpendicular, readable on all sides) */}
      {sectors.map((s,idx)=>{
        const start=idx*DEG,end=start+DEG,mid=(start+end)/2;
        const [lx,ly]=pt(R_LABEL,mid);
        const isLeft=Math.cos(clockToRad(mid))<0;
        const rotation=isLeft?(mid+90):(mid-90);
        const isBar=BAR_IDS.includes(s.id);
        const dimmed=mode==="cocina"&&isBar||mode==="bar"&&!isBar;
        return(
          <text key={`lbl-${s.id}`} x={lx} y={ly}
            textAnchor="middle" dominantBaseline="middle"
            fontSize="8.5" fontStyle="italic"
            fontFamily="'Inter',sans-serif"
            fill={dimmed?"rgba(200,200,200,.18)":"rgba(255,255,255,.92)"}
            fontWeight="500"
            transform={`rotate(${rotation},${lx},${ly})`}
            style={{cursor:"pointer",userSelect:"none"}}
            onClick={()=>onCatClick&&onCatClick(s.id)}
          >{s.name}</text>
        );
      })}
      {/* Separator lines */}
      {sectors.map((_,idx)=>{
        const[sx,sy]=pt(3,idx*DEG),[ex,ey]=pt(R_SECTOR,idx*DEG);
        return <line key={`sep-${idx}`} x1={sx} y1={sy} x2={ex} y2={ey} stroke="#fff" strokeWidth="1" opacity=".7"/>;
      })}
      {/* Ingredient labels */}
      {sectors.map((s,idx)=>{
        const start=idx*DEG;
        const isBar=BAR_IDS.includes(s.id);
        const dimmed=mode==="cocina"&&isBar||mode==="bar"&&!isBar;
        return s.ings.map((name,ii)=>{
          const slot=DEG/s.ings.length,angle=start+slot*(ii+.5);
          const rad=clockToRad(angle),[ix,iy]=pt(R_ING,angle);
          const isLeft=Math.cos(rad)<0,svgDeg=angle-90;
          const rotation=isLeft?svgDeg+180:svgDeg,anchor=isLeft?"end":"start";
          const isSel=selected.includes(name),isHov=hoverIng===name;
          return(
            <text key={`ing-${s.id}-${ii}`} x={ix} y={iy} textAnchor={anchor}
              fontSize={isSel||isHov?"10":"8.5"} fontFamily="'Inter',sans-serif"
              fontWeight={isSel?"700":"400"}
              fill={dimmed?"rgba(160,160,160,.2)":isSel?"#1B4FD8":isHov?"#0A0F1A":"#4A5568"}
              transform={`rotate(${rotation},${ix},${iy})`}
              style={{cursor:"pointer"}}
              onClick={()=>!dimmed&&onToggle(name)}
              onMouseOver={()=>!dimmed&&onHover(name)}
              onMouseOut={()=>onHover(null)}>
              {name}
            </text>
          );
        });
      })}
      {/* Selected dots */}
      {selected.map(name=>{
        const sec=sectors.find(s=>s.ings.includes(name));if(!sec)return null;
        const idx=sectors.indexOf(sec),ii=sec.ings.indexOf(name),slot=DEG/sec.ings.length;
        const angle=idx*DEG+slot*(ii+.5),[dx,dy]=pt(R_ING+10,angle);
        return <circle key={`dot-${name}`} cx={dx} cy={dy} r={4} fill="#1B4FD8" opacity=".9"/>;
      })}
      {/* Hover dot */}
      {hoverIng&&(()=>{
        const sec=sectors.find(s=>s.ings.includes(hoverIng));if(!sec)return null;
        const idx=sectors.indexOf(sec),ii=sec.ings.indexOf(hoverIng),slot=DEG/sec.ings.length;
        const angle=idx*DEG+slot*(ii+.5),[hx,hy]=pt(R_ING-4,angle);
        return <circle cx={hx} cy={hy} r={3} fill="#1B4FD8" opacity=".5"/>;
      })()}
      {/* Center dot */}
      <circle cx={CX} cy={CY} r={4} fill="#1B4FD8" opacity=".7"/>
    </svg>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
