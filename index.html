/* ══ SVG WHEEL MATH ══ */
const CX=380,CY=380,R_SECTOR=170,R_LABEL=97,R_ING=178;
const clockToRad=deg=>(deg-90)*Math.PI/180;
const pt=(r,deg)=>[CX+r*Math.cos(clockToRad(deg)),CY+r*Math.sin(clockToRad(deg))];
const slicePath=(s,e)=>{const[sx,sy]=pt(R_SECTOR,s),[ex,ey]=pt(R_SECTOR,e);return `M${CX} ${CY} L${sx} ${sy} A${R_SECTOR} ${R_SECTOR} 0 ${e-s>180?1:0} 1 ${ex} ${ey}Z`;};
const arcForLabel=(s,e)=>{const mid=((s+e)/2%360+360)%360,cw=mid<90||mid>270,r=R_LABEL,[sx,sy]=pt(r,s),[ex,ey]=pt(r,e),la=e-s>180?1:0;return cw?`M${sx} ${sy} A${r} ${r} 0 ${la} 1 ${ex} ${ey}`:`M${ex} ${ey} A${r} ${r} 0 ${la} 0 ${sx} ${sy}`;};

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null,info:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){this.setState({info});}
  render(){
    if(this.state.err){
      const msg = this.state.err?.message||String(this.state.err);
      const stack = this.state.info?.componentStack||"";
      return(
        <div style={{padding:32,fontFamily:"monospace",background:"#fff",minHeight:"100vh"}}>
          <h2 style={{color:"#DC2626",marginBottom:16}}>⚠️ Error detectado</h2>
          <p style={{background:"#FEE2E2",padding:16,borderRadius:8,marginBottom:16,fontSize:13}}>{msg}</p>
          <details style={{fontSize:11,color:"#666"}}>
            <summary style={{cursor:"pointer",marginBottom:8}}>Stack trace</summary>
            <pre style={{background:"#f5f5f5",padding:12,borderRadius:6,overflow:"auto"}}>{stack}</pre>
          </details>
          <button onClick={()=>{
            if(confirm("¿Limpiar datos guardados y reiniciar? Perderás las recetas del localStorage.")){
              localStorage.removeItem("mep_recipes");
              window.location.reload();
            }
          }} style={{marginTop:16,padding:"10px 20px",background:"#DC2626",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>
            🗑️ Limpiar datos y reiniciar
          </button>
          <button onClick={()=>window.location.reload()} style={{marginTop:16,marginLeft:8,padding:"10px 20px",background:"#1B4FD8",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>
            🔄 Reintentar
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App(){
  const demoIds=new Set(DEMO_R.map(r=>r.id));
  const[nav,setNav]=useState("recipes");
  const[view,setView]=useState("gallery");
  const[syncing,setSyncing]=useState(false);
  const[synced,setSynced]=useState(false);
  const[recipes,setRec]=useState(()=>{
    try{
      const hidden=new Set(JSON.parse(localStorage.getItem('mep_hidden')||'[]'));
      const user=JSON.parse(localStorage.getItem('mep_user')||'[]').filter(r=>!demoIds.has(r.id));
      return [...DEMO_R.filter(r=>!hidden.has(r.id)),...user];
    }catch(e){}
    return DEMO_R;
  });
  const[colls,setColls]=useState(DEMO_C);
  const[selId,setSelId]=useState(null);
  const[tab,setTab]=useState("recipe");
  const[country,setCtry]=useState("PE");
  const[prices,setPrices]=useState({});
  const[search,setSearch]=useState("");
  const[catF,setCatF]=useState("");
  const[editId,setEditId]=useState(null);
  useEffect(()=>{
    setSyncing(true);
    sbLoad().then(sbRows=>{
      const hidden=new Set(JSON.parse(localStorage.getItem('mep_hidden')||'[]'));
      const userSb=sbRows.filter(r=>!demoIds.has(r.id));
      const sbIds=new Set(sbRows.map(r=>r.id));
      JSON.parse(localStorage.getItem('mep_user')||'[]').filter(r=>!demoIds.has(r.id)&&!sbIds.has(r.id)).forEach(r=>sbUpsert(r));
      setRec([...DEMO_R.filter(r=>!hidden.has(r.id)),...userSb]);
      try{localStorage.setItem('mep_user',JSON.stringify(userSb));}catch(e){}
      setSyncing(false);setSynced(true);
    }).catch(()=>{setSyncing(false);setSynced(false);});
  },[]);
  useEffect(()=>{try{localStorage.setItem('mep_user',JSON.stringify(recipes.filter(r=>!demoIds.has(r.id))));}catch(e){}},[recipes]);
  const sel=recipes.find(r=>r.id===selId);
  const co=COUNTRIES.find(c=>c.code===country)||COUNTRIES[0];
  const filt=recipes.filter(r=>r.name.toLowerCase().includes(search.toLowerCase())&&(!catF||r.category===catF));
  const goBack=()=>{setView("gallery");setSelId(null);setEditId(null);};
  const openR=id=>{setSelId(id);setView("detail");setTab("recipe");setNav("recipes");};
  const saveR=r=>{const nr={...r,id:r.id||gid()};setRec(p=>[...p,nr]);if(!demoIds.has(nr.id))sbUpsert(nr);goBack();};
  const updR=r=>{setRec(p=>p.map(x=>x.id===r.id?r:x));if(!demoIds.has(r.id))sbUpsert(r);};
  const saveEdit=r=>{setRec(p=>p.map(x=>x.id===r.id?r:x));if(!demoIds.has(r.id))sbUpsert(r);setView("detail");setEditId(null);};
  const startEdit=id=>{setEditId(id);setSelId(id);setView("edit");};
  const delR=id=>{
    if(demoIds.has(id)){try{const h=JSON.parse(localStorage.getItem('mep_hidden')||'[]');if(!h.includes(id)){h.push(id);localStorage.setItem('mep_hidden',JSON.stringify(h));}}catch(e){}}
    else sbDelete(id);
    setRec(p=>p.filter(r=>r.id!==id));
    setView("gallery");setSelId(null);setEditId(null);
  };
  const importR=r=>{const nr={...r,id:r.id||gid()};setRec(p=>[...p,nr]);if(!demoIds.has(nr.id))sbUpsert(nr);};
  const getP=k=>prices[selId]?.[country]?.[k]??"";
  const setP=(k,v)=>setPrices(p=>({...p,[selId]:{...p[selId],[country]:{...p[selId]?.[country],[k]:v}}}));
  return(
    <div style={{fontFamily:FB,background:G.bg,minHeight:"100vh",color:G.text}}>
      <TopBar nav={nav} setNav={n=>{setNav(n);if(n!=="recipes")setView("gallery");}} view={view} onBack={goBack} recName={sel?.name} onAdd={()=>setView("add")} syncing={syncing} synced={synced}/>
      {nav==="recipes"&&<>
        {view==="gallery"&&<Gallery recipes={filt} onOpen={openR} onImport={importR} onEdit={startEdit} onDelete={delR} search={search} setSearch={setSearch} catF={catF} setCatF={setCatF} total={recipes.length} colls={colls} syncing={syncing} synced={synced}/>}
        {view==="detail"&&sel&&<Detail recipe={sel} tab={tab} setTab={setTab} country={country} setCountry={setCtry} co={co} getP={getP} setP={setP} onDelete={()=>delR(sel.id)} colls={colls} onUpdate={updR} onEdit={()=>startEdit(sel.id)}/>}
        {view==="add"&&<AddRecipe onSave={saveR} onCancel={goBack} colls={colls}/>}
        {view==="edit"&&recipes.find(r=>r.id===editId)&&<AddRecipe initialRecipe={recipes.find(r=>r.id===editId)} onSave={saveEdit} onCancel={()=>setView("detail")} colls={colls}/>}
      </>}
      {nav==="organize"&&<Organize recipes={recipes} colls={colls} setColls={setColls} onOpen={openR}/>}
      {nav==="lab"&&<FlavorLab recipes={recipes} onAddRecipe={r=>setRec(p=>[...p,{...r,id:gid()}])} onOpenRecipes={()=>{setNav("recipes");setView("gallery");}}/>}
    </div>
  );
}

function TopBar({nav,setNav,view,onBack,recName,onAdd,sbSyncing,sbReady,onRefresh}){
  const mob=useMobile();
  const NAV=[["recipes","Recetas","🍽"],["organize","Colecciones","📁"],["lab","Laboratorio","🧪"]];
  return(
    <header style={{background:G.w,borderBottom:`1px solid ${G.brd}`,padding:mob?"0 16px":"0 32px",height:mob?52:56,display:"flex",alignItems:"center",gap:mob?8:16,position:"sticky",top:0,zIndex:50}}>
      {nav==="recipes"&&view!=="gallery"
        ?<button onClick={onBack} style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontFamily:FB,fontSize:13,padding:"4px 0",flexShrink:0}} onMouseOver={e=>e.currentTarget.style.color=G.blue} onMouseOut={e=>e.currentTarget.style.color=G.textMut}>← Volver</button>
        :<span style={{fontFamily:FH,fontSize:mob?12:15,color:G.text,letterSpacing:mob?2:4,fontWeight:700,flexShrink:0}}>MISE EN PLACE</span>}
      {!mob&&recName&&<><span style={{color:G.brd,fontSize:14}}>·</span><span style={{fontFamily:FB,fontSize:12,color:G.textMut,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>{recName}</span></>}
      <nav style={{display:"flex",gap:0,marginLeft:"auto",alignItems:"center"}}>
        {NAV.map(([id,label,icon])=>(
          <button key={id} onClick={()=>setNav(id)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:FB,fontSize:mob?10:12,color:nav===id?G.blue:G.textMut,fontWeight:nav===id?700:400,padding:mob?"0 10px":"0 14px",height:mob?52:56,borderBottom:nav===id?`2px solid ${G.blue}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,transition:"color .15s"}}>
            {mob&&<span style={{fontSize:16}}>{icon}</span>}
            {label}
          </button>
        ))}
        <button onClick={()=>onRefresh&&onRefresh()} disabled={sbSyncing} title="Actualizar desde la nube" style={{background:"none",border:"none",cursor:sbSyncing?"wait":"pointer",color:sbSyncing?"#F59E0B":G.textMut,fontSize:18,padding:"0 8px",display:"flex",alignItems:"center",lineHeight:1}} onMouseOver={e=>e.currentTarget.style.color=G.blue} onMouseOut={e=>e.currentTarget.style.color=sbSyncing?"#F59E0B":G.textMut}>↻</button>
        {!mob&&nav==="recipes"&&view==="gallery"&&<button onClick={onAdd} style={{...bv("p",{padding:"7px 16px",fontSize:11,fontWeight:700,marginLeft:4})}} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>+ Nueva Receta</button>}
      </nav>
    </header>
  );
}

              const blob=new Blob([JSON.stringify(recipes,null,2)],{type:"application/json"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;a.download="mise-en-place-backup-"+new Date().toISOString().slice(0,10)+".json";
              a.click();URL.revokeObjectURL(url);
            }} style={bv("ghost",{padding:"8px 14px",fontSize:12,borderRadius:6,display:"flex",alignItems:"center",gap:5})} title="Exportar todas las recetas como JSON" onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>
              ⬆ Exportar todo
            </button>
            {/* Import ALL */}
            <label style={{...bv("ghost",{padding:"8px 14px",fontSize:12,borderRadius:6,display:"flex",alignItems:"center",gap:5,cursor:"pointer"}),border:`1px solid ${G.brd}`}} title="Importar backup JSON completo" onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>
              ⬇ Importar todo
              <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0]; if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  try{
                    const data=JSON.parse(ev.target.result);
                    const arr=Array.isArray(data)?data:[data];
                    if(arr.length===0)return alert("El archivo está vacío.");
                    if(confirm(`¿Importar ${arr.length} recetas? Esto se sumará a tus ${recipes.length} recetas actuales.`)){
                      const existing=new Set(recipes.map(r=>r.id));
                      const newOnes=arr.filter(r=>!existing.has(r.id));
                      const updated=arr.filter(r=>existing.has(r.id));
                      setRec(p=>{
                        const merged=p.map(r=>{const u=updated.find(x=>x.id===r.id);return u||r;});
                        return [...merged,...newOnes];
                      });
                      alert(`✅ ${newOnes.length} recetas nuevas agregadas, ${updated.length} actualizadas.`);
                    }
                  }catch(err){alert("Error leyendo el archivo: "+err.message);}
                };
                reader.readAsText(file);
                e.target.value="";
              }}/>
            </label>
            <button onClick={()=>setShowImport(true)} style={bv("ghost",{padding:"8px 14px",fontSize:12,borderRadius:6,display:"flex",alignItems:"center",gap:5})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>📥 Importar receta</button>
          </div>
          {/* Cloud sync status */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:20,background:"#F0FDF4",border:"1px solid #6EE7B7"}}>
              <span style={{fontSize:13}}>✅</span>
              <span style={{fontFamily:FB,fontSize:11,fontWeight:600,color:"#065F46"}}>{total} receta{total!==1?"s":""} archivadas</span>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:28,flexWrap:"wrap"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar receta…" style={inp({flex:1,minWidth:160})} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
        <select value={catF} onChange={e=>setCatF(e.target.value)} style={inp({width:"auto",cursor:"pointer"})}>
          <option value="">Todas las categorías</option>
          {CATEGORIES.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      {recipes.length===0
        ?<div style={{textAlign:"center",padding:"80px 0",color:G.textMut}}>
            <p style={{fontFamily:FH,fontSize:22,color:G.text,margin:"0 0 8px",fontWeight:700}}>Sin resultados</p>
            <p style={{fontSize:12}}>Agrega tu primera receta con el botón superior derecho</p>
          </div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:20}}>
            {recipes.map(r=><RecipeCard key={r.id} recipe={r} onOpen={()=>onOpen(r.id)} colls={colls}
              onDelete={()=>onDelete&&onDelete(r.id)} onEdit={()=>onEdit&&onEdit(r.id)}
              onExport={()=>{const cl={...r,photo:r.photo?"[foto]":null};const b=new Blob([JSON.stringify(cl,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=r.name.replace(/\s+/g,"-").toLowerCase()+".json";a.click();URL.revokeObjectURL(u);}}
            />)}
          </div>}
    </div>
  );
}

function RecipeTab({recipe,onUpdate}){
  const[editStep,setEditStep]=useState(null);
  const[draft,setDraft]=useState("");
  const[extracting,setExtracting]=useState({}); // {stepId: true} while loading

  const startEdit=(stepId,field,current)=>{setEditStep({stepId,field});setDraft(current);};
  const saveEdit=(stepId,field)=>{
    if(!onUpdate)return;
    const updated={...recipe,steps:recipe.steps.map(s=>{
      if(s.id!==stepId)return s;
      if(field==="name")return{...s,name:draft};
      if(field==="method")return{...s,method:draft};
      if(field==="notes")return{...s,notes:draft};
      return s;
    })};
    onUpdate(updated);
    setEditStep(null);
  };
  const isEditing=(sid,f)=>editStep?.stepId===sid&&editStep?.field===f;

  const extractIngredients=async(step)=>{
    if(!onUpdate||!step.method)return;
    setExtracting(p=>({...p,[step.id]:true}));
    try{
      const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:"Eres un chef experto. Extraes ingredientes de textos de recetas. Responde SOLO con JSON válido, sin texto extra.",
          messages:[{role:"user",content:`Analiza este texto de receta y extrae TODOS los ingredientes con sus cantidades y unidades.

Texto: "${step.method}"

Responde SOLO con este JSON válido (array):
[{"name":"Ingrediente","quantity":2,"unit":"tazas","yieldPct":100}]

Si no hay cantidad específica usa 1. Unidades válidas: g, kg, ml, l, tsp, tbsp, cup, oz, lb, unid, al gusto.`}]})});
      const data=await res.json();
      if(!res.ok)throw new Error(data?.error?.message||"Error API");
      const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
      const m=raw.match(/\[[\s\S]*\]/);
      const ings=JSON.parse(m?m[0]:raw);
      const updated={...recipe,steps:recipe.steps.map(s=>s.id!==step.id?s:
        {...s,ingredients:ings.map(i=>({...i,id:gid()}))})};
      onUpdate(updated);
    }catch(e){alert("Error extrayendo ingredientes: "+e.message);}
    setExtracting(p=>({...p,[step.id]:false}));
  };

  const editStyle={cursor:"text",borderBottom:`1px dashed ${G.blue}`,paddingBottom:1};
  const pencil=<span style={{fontSize:9,color:G.blue,marginLeft:5,opacity:.5}}>✎</span>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {(recipe.steps||[]).map((step,idx)=>(
        <div key={step.id} style={{border:`1px solid ${G.brd}`,borderRadius:10,overflow:"hidden"}}>
          {/* Step header */}
          <div style={{background:G.surf,borderBottom:`1px solid ${G.brd}`,padding:"12px 20px",display:"flex",alignItems:"center",gap:12}}>
            <span style={{background:G.blue,color:G.w,width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,fontFamily:FH}}>{idx+1}</span>
            {isEditing(step.id,"name")
              ?<input autoFocus value={draft} onChange={e=>setDraft(e.target.value)}
                  onBlur={()=>saveEdit(step.id,"name")}
                  onKeyDown={e=>{if(e.key==="Enter")saveEdit(step.id,"name");if(e.key==="Escape")setEditStep(null);}}
                  style={{fontFamily:FH,fontSize:16,fontWeight:700,border:"none",borderBottom:`2px solid ${G.blue}`,outline:"none",background:"transparent",color:G.text,flex:1}}/>
              :<span onClick={()=>onUpdate&&startEdit(step.id,"name",step.name)}
                  style={{fontFamily:FH,fontSize:16,color:G.text,fontWeight:700,...(onUpdate?editStyle:{})}} title={onUpdate?"Clic para editar":""}>
                  {step.name}{onUpdate&&pencil}
                </span>}
          </div>
          <div style={{padding:"20px",display:"flex",gap:24,flexWrap:"wrap",background:G.w}}>
            {/* Ingredients */}
            <div style={{flex:"0 0 280px",minWidth:180}}>
              <p style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:10,fontFamily:FB}}>Ingredientes</p>
              {(step.ingredients?.length??0)===0&&onUpdate
                ?<button onClick={()=>extractIngredients(step)} disabled={extracting[step.id]}
                    style={{...bv("p",{padding:"8px 14px",fontSize:11,borderRadius:6,width:"100%",opacity:extracting[step.id]?.6:1}),display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4}}
                    onMouseOver={e=>{if(!extracting[step.id])e.currentTarget.style.background=G.blueHov;}} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
                    {extracting[step.id]?"Extrayendo…":"✦ Extraer ingredientes con IA"}
                  </button>
                :<table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr style={{borderBottom:`1px solid ${G.brd}`}}>
                    {["Ingrediente","Cant.","Unid.","Rend."].map(h=><th key={h} style={{textAlign:"left",padding:"4px 5px",fontSize:9,color:G.textMut,fontWeight:600,letterSpacing:.8,textTransform:"uppercase",fontFamily:FB}}>{h}</th>)}
                  </tr></thead>
                  <tbody>{(step.ingredients||[]).map(i=>(
                    <tr key={i.id} style={{borderBottom:`1px solid ${G.brd}`}}>
                      <td style={{padding:"6px 5px",fontSize:12,color:G.text,fontFamily:FB}}>{i.name}</td>
                      <td style={{padding:"6px 5px",fontSize:12,color:G.textMid,textAlign:"right",fontFamily:FB}}>{fmtN(i.quantity,2)}</td>
                      <td style={{padding:"6px 5px",fontSize:11,color:G.textMut,fontFamily:FB}}>{i.unit}</td>
                      <td style={{padding:"6px 5px",fontSize:11,color:G.blue,textAlign:"right",fontFamily:FB,fontWeight:500}}>{i.yieldPct}%</td>
                    </tr>
                  ))}</tbody>
                </table>}
            </div>
            {/* Methodology */}
            <div style={{flex:1,minWidth:180}}>
              <p style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:10,fontFamily:FB}}>Metodología</p>
              {isEditing(step.id,"method")
                ?<textarea autoFocus value={draft} onChange={e=>setDraft(e.target.value)} rows={6}
                    onBlur={()=>saveEdit(step.id,"method")}
                    onKeyDown={e=>{if(e.key==="Escape")setEditStep(null);}}
                    style={{width:"100%",fontFamily:FB,fontSize:12,lineHeight:1.8,border:`1px solid ${G.blue}`,borderRadius:6,padding:"8px 10px",outline:"none",resize:"vertical",color:G.text,boxSizing:"border-box"}}/>
                :<p onClick={()=>onUpdate&&startEdit(step.id,"method",step.method)}

                  :<p onClick={()=>onUpdate&&startEdit(step.id,"notes",step.notes||"")}

}


/* ══ NUTRICIÓN TAB ══ */
function NutricionTab({recipe,onUpdate}){
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const nutrition=recipe.nutrition||null;
  const calculate=async()=>{
    setLoading(true);setError("");
    try{
      const allIng=[];
      (recipe.steps||[]).forEach(s=>(s.ingredients||[]).forEach(i=>allIng.push(i)));
      if(allIng.length===0){setError("Sin ingredientes estructurados. Usa ✦ Extraer ingredientes primero.");setLoading(false);return;}
      let tot={kcal:0,protein:0,carbs:0,fat:0,fiber:0};
      const bd=[];
      for(const ing of allIng){
        const data=await usdaLookup(ing.name);
        const grams=toGrams(ing.quantity||1,ing.unit||"g");
        if(data){
          const f=(grams*(ing.yieldPct||100)/100)/100;
          const row={name:ing.name,grams,kcal:+(data.per100g.kcal*f).toFixed(1),protein:+(data.per100g.protein*f).toFixed(1),carbs:+(data.per100g.carbs*f).toFixed(1),fat:+(data.per100g.fat*f).toFixed(1),fiber:+(data.per100g.fiber*f).toFixed(1),usdaName:data.name};
          bd.push(row);
          tot.kcal+=row.kcal;tot.protein+=row.protein;tot.carbs+=row.carbs;tot.fat+=row.fat;tot.fiber+=row.fiber;
        }else{
          bd.push({name:ing.name,grams,kcal:0,protein:0,carbs:0,fat:0,fiber:0,usdaName:"No encontrado en USDA"});
        }
        await new Promise(r=>setTimeout(r,250));
      }
      const por=recipe.portions||1;
      const pp={kcal:+(tot.kcal/por).toFixed(0),protein:+(tot.protein/por).toFixed(1),carbs:+(tot.carbs/por).toFixed(1),fat:+(tot.fat/por).toFixed(1),fiber:+(tot.fiber/por).toFixed(1)};
      onUpdate&&onUpdate({...recipe,nutrition:{perPortion:pp,total:tot,breakdown:bd,calculatedAt:new Date().toISOString()}});
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  };
  const n=nutrition?.perPortion;
  const MACROS=n?[
    {label:"Calorías",val:n.kcal,unit:"kcal",color:"#EF4444"},
    {label:"Proteína",val:n.protein,unit:"g",color:"#3B82F6",pct:n.kcal>0?Math.round(n.protein*4*100/n.kcal):0},
    {label:"Carbs",val:n.carbs,unit:"g",color:"#F59E0B",pct:n.kcal>0?Math.round(n.carbs*4*100/n.kcal):0},
    {label:"Grasa",val:n.fat,unit:"g",color:"#10B981",pct:n.kcal>0?Math.round(n.fat*9*100/n.kcal):0},
    {label:"Fibra",val:n.fiber,unit:"g",color:"#8B5CF6"},
  ]:[];
  return(
    <div style={{fontFamily:FB}}>
      {!nutrition&&!loading&&<div style={{textAlign:"center",padding:"48px 0"}}>
        <p style={{fontSize:14,color:G.textMut,marginBottom:20}}>Macros y calorías por porción usando USDA FoodData Central (600K+ alimentos)</p>
        <button onClick={calculate} style={bv("p",{padding:"12px 28px",fontSize:13,borderRadius:8})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>🔬 Calcular nutrición</button>
      </div>}
      {loading&&<div style={{textAlign:"center",padding:"48px 0"}}>
        <p style={{fontSize:13,color:G.textMut}}>Consultando USDA FoodData Central…</p>
        <p style={{fontSize:11,color:G.brd,marginTop:8}}>Un momento por favor</p>
      </div>}
      {error&&<p style={{color:G.red,fontSize:12,padding:"12px 16px",background:"#FEE2E2",borderRadius:8,marginBottom:16}}>{error}</p>}
      {n&&<div>
        <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
          {MACROS.map(m=><div key={m.label} style={{flex:"1 1 90px",background:G.surf,border:`1px solid ${G.brd}`,borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,color:m.color,fontFamily:FH}}>{m.val}<span style={{fontSize:11,fontWeight:400,color:G.textMut}}>{m.unit}</span></div>
            <div style={{fontSize:9,color:G.textMut,letterSpacing:.5,textTransform:"uppercase",marginTop:3}}>{m.label}</div>
            {m.pct!==undefined&&<div style={{fontSize:10,color:m.color}}>{m.pct}%</div>}
          </div>)}
        </div>
        <p style={{fontSize:10,color:G.textMut,marginBottom:12,textAlign:"right"}}>Por porción · {recipe.portions} porciones totales</p>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:480}}>
            <thead><tr style={{borderBottom:`2px solid ${G.brd}`}}>
              {["Ingrediente","Match USDA","g","kcal","Prot.","Carb.","Grasa"].map(h=><th key={h} style={{textAlign:"left",padding:"5px 8px",color:G.textMut,fontWeight:600,fontSize:9,textTransform:"uppercase"}}>{h}</th>)}
            </tr></thead>
            <tbody>{(nutrition.breakdown||[]).map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${G.brd}`}}>
              <td style={{padding:"6px 8px",color:G.text,fontWeight:500}}>{r.name}</td>
              <td style={{padding:"6px 8px",color:G.textMut,fontSize:10,fontStyle:"italic"}}>{r.usdaName}</td>
              <td style={{padding:"6px 8px",color:G.textMid,textAlign:"right"}}>{Math.round(r.grams)}</td>
              <td style={{padding:"6px 8px",color:"#EF4444",textAlign:"right",fontWeight:600}}>{r.kcal}</td>
              <td style={{padding:"6px 8px",color:"#3B82F6",textAlign:"right"}}>{r.protein}g</td>
              <td style={{padding:"6px 8px",color:"#F59E0B",textAlign:"right"}}>{r.carbs}g</td>
              <td style={{padding:"6px 8px",color:"#10B981",textAlign:"right"}}>{r.fat}g</td>
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{marginTop:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style={{fontSize:10,color:G.textMut}}>Fuente: USDA FoodData Central · {new Date(nutrition.calculatedAt).toLocaleDateString("es-PE")}</p>
          <button onClick={calculate} disabled={loading} style={bv("ghost",{fontSize:11,padding:"6px 14px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>⟳ Recalcular</button>
        </div>
      </div>}
    </div>
  );
}

const eStep=()=>({id:gid(),name:"",method:"",ingredients:[eIng()]});
const eIng=()=>({id:gid(),name:"",quantity:"",unit:"g",yieldPct:100});
/* ══ IMPORT MODAL ══ */
function ImportModal({onClose,onImport,colls}){
  const[tab,setTab]=useState("file");
  const[loading,setLoading]=useState(false);
  const[preview,setPreview]=useState(null);
  const[error,setError]=useState("");
  const[urlVal,setUrlVal]=useState("");
  const[textVal,setTextVal]=useState("");
  const fileRef=useRef();
  const batchRef=useRef();
  // Batch state
  const[batchFiles,setBatchFiles]=useState([]);   // [{file, status:'pending'|'ok'|'error', name, error}]
  const[batchRunning,setBatchRunning]=useState(false);
  const[batchDone,setBatchDone]=useState(0);
  const[batchSaved,setBatchSaved]=useState(0);
  const[batchFinished,setBatchFinished]=useState(false);

  const EXTRACT_PROMPT=`Extrae la receta completa. Responde SOLO con JSON válido (sin texto extra):
{"name":"Nombre","category":"Categoría","portions":4,"plating":"Emplatado","cutlery":["fork_knife"],"steps":[{"name":"Paso","method":"Metodología","ingredients":[{"name":"Ingrediente","quantity":200,"unit":"g","yieldPct":90}]}]}`;

  const normalize=p=>({...p,id:gid(),photo:null,colls:p.colls||[],links:p.links||[],
    steps:(p.steps||[]).map(s=>({...s,id:s.id||gid(),method:s.method||"",notes:s.notes||"",
      ingredients:(s.ingredients||[]).map(i=>({...i,id:i.id||gid()}))}))});

  const toBase64=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  const toText=file=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file);});

  const extractOne=async(file)=>{
    const ext=file.name.split(".").pop().toLowerCase();
    const imgExts=["jpg","jpeg","png","webp","gif","bmp","tiff","avif"];
    const isPDF=file.type==="application/pdf"||ext==="pdf";
    const isImg=file.type.startsWith("image/")||imgExts.includes(ext);
    const isHEIC=ext==="heic"||ext==="heif";
    const isJSON=ext==="json";
    const isCSV=ext==="csv";
    const isMarkdown=ext==="md"||ext==="markdown";

    // JSON — no AI needed, already structured
    if(isJSON){
      const text=await toText(file);
      const data=JSON.parse(text);
      if(Array.isArray(data)){
        // Return special marker — caller handles array expansion
        return {_isArray:true,_items:data};
      }
      return data; // single recipe object
    }

    let messages;
    if(isPDF){
      const b64=await toBase64(file);
      messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:EXTRACT_PROMPT}]}];
    } else if(isHEIC){
      throw new Error("Formato HEIC no soportado. Convierte la foto a JPG o PNG (iPhone: Ajustes → Cámara → Formatos → Más compatible).");
    } else if(isImg){
      const mimeType=file.type.startsWith("image/")?file.type:`image/${ext==="jpg"?"jpeg":ext}`;
      const b64=await toBase64(file);
      messages=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mimeType,data:b64}},{type:"text",text:EXTRACT_PROMPT}]}];
    } else {
      // TXT, CSV, MD, RTF, DOC, XLS — read as text and send to Claude
      const text=await toText(file);
      const hint=isCSV?"Este archivo CSV puede contener múltiples recetas en columnas. Extrae la primera receta completa.":
                  isMarkdown?"Este archivo Markdown contiene una receta.":"";
      messages=[{role:"user",content:EXTRACT_PROMPT+(hint?"\n\n"+hint:"")+"\n\nContenido:\n"+text.slice(0,10000)}];
    }
    const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,
        system:"Chef experto. Responde SOLO JSON válido, sin texto extra.",messages})});
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error?.message||`Error ${res.status}`);
    const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
    const m=raw.match(/\{[\s\S]*\}/);
    return JSON.parse(m?m[0]:raw);
  };

  // Single file import (with preview)
  const importFile=async(file)=>{
    setLoading(true);setError("");setPreview(null);
    try{ const p=await extractOne(file); setPreview(normalize(p)); }
    catch(e){ setError("Error: "+e.message); }
    setLoading(false);
  };

  // BATCH import
  const startBatch=async()=>{
    if(batchFiles.length===0)return;
    setBatchRunning(true);setBatchDone(0);setBatchSaved(0);setBatchFinished(false);
    let saved=0;
    const updated=[...batchFiles];
    for(let i=0;i<updated.length;i++){
      updated[i]={...updated[i],status:"processing"};
      setBatchFiles([...updated]);
      try{
        const parsed=await extractOne(updated[i].file);
        // JSON array — expand all recipes at once
        if(parsed._isArray){
          const items=parsed._items||[];
          items.forEach(r=>onImport(normalize(r)));
          updated[i]={...updated[i],status:"ok",recipeName:`${items.length} recetas de ${updated[i].name}`};
          saved+=items.length;
        } else {
          const recipe=normalize(parsed);
          onImport(recipe);
          updated[i]={...updated[i],status:"ok",recipeName:parsed.name};
          saved++;
        }
        setBatchSaved(saved);
      }catch(e){
        updated[i]={...updated[i],status:"error",errorMsg:e.message};
      }
      setBatchDone(i+1);
      setBatchFiles([...updated]);
      // Small delay to avoid rate limits
      if(i<updated.length-1)await new Promise(r=>setTimeout(r,800));
    }
    setBatchRunning(false);setBatchFinished(true);
  };

  const addBatchFiles=files=>{
    const arr=Array.from(files).map(f=>({file:f,status:"pending",name:f.name}));
    setBatchFiles(p=>[...p,...arr]);setBatchFinished(false);
  };

  const removeBatchFile=idx=>setBatchFiles(p=>p.filter((_,i)=>i!==idx));

  // URL import
  const importURL=async()=>{
    if(!urlVal.trim()){setError("Ingresa una URL");return;}
    setLoading(true);setError("");setPreview(null);
    try{
      const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:"Chef experto. Busca la receta y devuelve SOLO JSON válido.",
          messages:[{role:"user",content:"Extrae la receta de: "+urlVal+"\n\n"+EXTRACT_PROMPT}]})});
      const data=await res.json();
      if(!res.ok)throw new Error(data?.error?.message||"Error API");
      const raw=(data.content||[]).filter(x=>x.type==="text").map(x=>x.text).join("").replace(/```json\n?|```\n?/g,"").trim();
      const m=raw.match(/\{[\s\S]*\}/);
      const parsed=JSON.parse(m?m[0]:raw);
      const nr=normalize(parsed);
      nr.links=[{id:gid(),label:"Fuente original",url:urlVal.trim()},...(nr.links||[])];
      setPreview(nr);
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  };

  // Text import (single or multi)
  const importText=async()=>{
    if(!textVal.trim()){setError("Pega el texto");return;}
    setLoading(true);setError("");setPreview(null);
    const hasMultiple=textVal.includes("---");
    try{
      if(hasMultiple){
        const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,
            system:"Chef experto. Responde SOLO con array JSON válido, sin texto extra.",
            messages:[{role:"user",content:`Este texto contiene MÚLTIPLES recetas separadas por "---". Extráelas TODAS como array JSON:\n[{receta1},{receta2},...]\n\nCada receta con formato:\n{"name":"...","category":"...","portions":4,"plating":"...","cutlery":["fork_knife"],"steps":[{"name":"...","method":"...","ingredients":[{"name":"...","quantity":100,"unit":"g","yieldPct":90}]}]}\n\nTexto:\n${textVal.slice(0,12000)}`}]})});
        const data=await res.json();
        if(!res.ok)throw new Error(data?.error?.message||"Error");
        const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
        const m=raw.match(/\[[\s\S]*\]/);
        const arr=JSON.parse(m?m[0]:raw);
        arr.forEach(p=>onImport(normalize(p)));
        setPreview({_multi:true,_count:arr.length});
      } else {
        const res=await fetch(AI_URL,{method:"POST",headers:AHEADERS(),
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,
            system:"Chef experto. Responde SOLO JSON válido.",
            messages:[{role:"user",content:EXTRACT_PROMPT+"\n\nTexto:\n"+textVal.slice(0,8000)}]})});
        const data=await res.json();
        if(!res.ok)throw new Error(data?.error?.message||"Error");
        const raw=(data.content?.[0]?.text||"").replace(/```json\n?|```\n?/g,"").trim();
        const m=raw.match(/\{[\s\S]*\}/);
        setPreview(normalize(JSON.parse(m?m[0]:raw)));
      }
    }catch(e){setError("Error: "+e.message);}
    setLoading(false);
  };

  const TABS=[["file","📄 Archivo"],["batch","📦 Carga Masiva"],["url","🔗 URL / Video"],["text","📝 Texto"]];
  const pct=batchFiles.length>0?Math.round(batchDone/batchFiles.length*100):0;
  const statusIcon=s=>s==="ok"?"✅":s==="error"?"❌":s==="processing"?"⏳":"⬜";

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div style={{background:G.w,borderRadius:16,width:"100%",maxWidth:640,maxHeight:"92vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,.25)"}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"18px 24px 14px",borderBottom:`1px solid ${G.brd}`,display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:G.w,zIndex:1}}>
          <div>
            <h3 style={{fontFamily:FH,fontSize:20,color:G.text,margin:"0 0 2px",fontWeight:700}}>Importar Recetas</h3>
            <p style={{fontFamily:FB,fontSize:11,color:G.textMut,margin:0}}>Individual o carga masiva — PDF · Word · Excel · Foto · URL · Texto</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:G.textMut}}>✕</button>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",borderBottom:`1px solid ${G.brd}`,padding:"0 24px",overflowX:"auto"}}>
          {TABS.map(([id,label])=>(
            <button key={id} onClick={()=>{setTab(id);setError("");setPreview(null);}} style={{background:"none",border:"none",cursor:"pointer",padding:"10px 14px",fontFamily:FB,fontSize:12,fontWeight:600,color:tab===id?G.blue:G.textMut,borderBottom:tab===id?`2px solid ${G.blue}`:"2px solid transparent",marginBottom:-1,whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>
        {/* Body */}
        <div style={{padding:"20px 24px"}}>

          {/* ─── SINGLE FILE ─── */}
          {tab==="file"&&(
            <div>
              <p style={{fontFamily:FB,fontSize:12,color:G.textMid,marginBottom:12,lineHeight:1.6}}>Sube un archivo con tu receta. Soporta <strong>PDF</strong>, <strong>Word</strong>, <strong>Excel</strong>, <strong>JSON</strong>, <strong>CSV</strong>, <strong>TXT</strong>, <strong>Markdown</strong>, <strong>foto</strong>.</p>
              <input type="file" ref={fileRef} accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.webp,.heic,.txt,.json,.csv,.md,.rtf,.odt" style={{display:"none"}} onChange={e=>e.target.files[0]&&importFile(e.target.files[0])}/>
              <div
                onClick={()=>!loading&&fileRef.current.click()}
                onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=G.blue;e.currentTarget.style.background=G.blueTint;}}
                onDragLeave={e=>{e.currentTarget.style.borderColor=G.brd;e.currentTarget.style.background=G.surf;}}
                onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];e.currentTarget.style.borderColor=G.brd;e.currentTarget.style.background=G.surf;if(f&&!loading)importFile(f);}}
                style={{border:`2px dashed ${G.brd}`,borderRadius:10,padding:"28px 20px",textAlign:"center",cursor:loading?"not-allowed":"pointer",background:G.surf,transition:"all .15s",opacity:loading?.6:1}}>
                <p style={{fontFamily:FH,fontSize:22,margin:"0 0 6px"}}>{loading?"⏳":"📂"}</p>
                <p style={{fontFamily:FH,fontSize:14,color:G.text,margin:"0 0 4px",fontWeight:700}}>{loading?"Analizando con IA…":"Arrastra tu archivo aquí"}</p>
                <p style={{fontFamily:FB,fontSize:11,color:G.textMut,margin:0}}>o haz clic para seleccionar · PDF · Word · Excel · JSON · CSV · MD · foto</p>
              </div>
            </div>
          )}

          {/* ─── BATCH ─── */}
          {tab==="batch"&&(
            <div>
              <p style={{fontFamily:FB,fontSize:12,color:G.textMid,marginBottom:14,lineHeight:1.6}}>
                Selecciona <strong>múltiples archivos</strong> de golpe. Soporta PDF, Word, Excel, JSON (unitario o array), CSV, TXT, Markdown y fotos. Procesa en cola y guarda automáticamente.
              </p>
              {/* Drop zone */}
              {!batchRunning&&!batchFinished&&(
                <div
                  onClick={()=>batchRef.current.click()}
                  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=G.blue;e.currentTarget.style.background=G.blueTint;}}
                  onDragLeave={e=>{e.currentTarget.style.borderColor=G.brd;e.currentTarget.style.background=G.surf;}}
                  onDrop={e=>{e.preventDefault();addBatchFiles(e.dataTransfer.files);e.currentTarget.style.borderColor=G.brd;e.currentTarget.style.background=G.surf;}}
                  style={{border:`2px dashed ${G.brd}`,borderRadius:10,padding:"28px",textAlign:"center",cursor:"pointer",background:G.surf,marginBottom:14,transition:"all .15s"}}>
                  <p style={{fontFamily:FH,fontSize:22,margin:"0 0 6px"}}>📂</p>
                  <p style={{fontFamily:FH,fontSize:15,color:G.text,margin:"0 0 4px",fontWeight:700}}>Arrastra aquí tus archivos</p>
                  <p style={{fontFamily:FB,fontSize:11,color:G.textMut,margin:0}}>o haz clic — PDF, Word, Excel, JSON, CSV, MD, foto</p>
                </div>
              )}
              <input type="file" ref={batchRef} multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.webp,.heic,.txt,.json,.csv,.md,.rtf,.odt" style={{display:"none"}} onChange={e=>addBatchFiles(e.target.files)}/>

              {/* File queue */}
              {batchFiles.length>0&&(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <p style={{fontFamily:FB,fontSize:11,color:G.textMid,margin:0,fontWeight:600}}>{batchFiles.length} archivo{batchFiles.length!==1?"s":""} en cola</p>
                    {!batchRunning&&!batchFinished&&<button onClick={()=>setBatchFiles([])} style={{...bv("ghost",{fontSize:10,padding:"3px 10px",borderRadius:4,color:G.red})}} onMouseOver={e=>e.currentTarget.style.background=G.red+"08"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>Limpiar todo</button>}
                  </div>
                  {/* Progress bar */}
                  {(batchRunning||batchFinished)&&(
                    <div style={{marginBottom:12}}>
                      <div style={{background:G.brd,borderRadius:20,height:8,overflow:"hidden",marginBottom:6}}>
                        <div style={{width:pct+"%",background:batchFinished?G.green:G.blue,height:"100%",transition:"width .4s",borderRadius:20}}/>
                      </div>
                      <p style={{fontFamily:FB,fontSize:11,color:G.textMid,margin:0}}>
                        {batchFinished
                          ?`✅ Completado — ${batchSaved} receta${batchSaved!==1?"s":""} importada${batchSaved!==1?"s":""}, ${batchFiles.filter(f=>f.status==="error").length} con error`
                          :`Procesando ${batchDone} de ${batchFiles.length}…`}
                      </p>
                    </div>
                  )}
                  {/* File list */}
                  <div style={{maxHeight:260,overflowY:"auto",border:`1px solid ${G.brd}`,borderRadius:8,marginBottom:14}}>
                    {batchFiles.map((f,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:i<batchFiles.length-1?`1px solid ${G.brd}`:"none",background:f.status==="ok"?G.green+"08":f.status==="error"?G.red+"08":"transparent"}}>
                        <span style={{fontSize:14,flexShrink:0}}>{statusIcon(f.status)}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <p style={{fontFamily:FB,fontSize:12,color:G.text,margin:0,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.recipeName||f.name}</p>
                          {f.status==="error"&&<p style={{fontFamily:FB,fontSize:10,color:G.red,margin:0}}>{f.errorMsg}</p>}
                          {f.status==="ok"&&f.recipeName!==f.name&&<p style={{fontFamily:FB,fontSize:10,color:G.green,margin:0}}>{f.name}</p>}
                        </div>
                        {!batchRunning&&f.status==="pending"&&<button onClick={()=>removeBatchFile(i)} style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontSize:14,padding:"2px 4px"}} onMouseOver={e=>e.currentTarget.style.color=G.red} onMouseOut={e=>e.currentTarget.style.color=G.textMut}>✕</button>}
                      </div>
                    ))}
                  </div>
                  {/* Actions */}
                  {!batchRunning&&!batchFinished&&(
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={startBatch} style={bv("p",{padding:"10px 20px",borderRadius:8,flex:1,fontSize:13})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
                        ▶ Importar {batchFiles.length} receta{batchFiles.length!==1?"s":""}
                      </button>
                      <button onClick={()=>batchRef.current.click()} style={bv("ghost",{padding:"10px 16px",borderRadius:8,fontSize:12})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>+ Agregar más</button>
                    </div>
                  )}
                  {batchFinished&&(
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={onClose} style={bv("p",{padding:"10px 20px",borderRadius:8,flex:1,fontSize:13})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>Ver repositorio</button>
                      <button onClick={()=>{setBatchFiles([]);setBatchFinished(false);setBatchDone(0);setBatchSaved(0);}} style={bv("ghost",{padding:"10px 16px",borderRadius:8,fontSize:12})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>Nueva carga</button>
                    </div>
                  )}
                </div>
              )}
              {batchFiles.length===0&&<p style={{fontFamily:FB,fontSize:11,color:G.textMut,textAlign:"center",marginTop:8}}>Consejo: también puedes arrastrar archivos directamente al área de arriba</p>}
            </div>
          )}

          {/* ─── URL ─── */}
          {tab==="url"&&(
            <div>
              <p style={{fontFamily:FB,fontSize:12,color:G.textMid,marginBottom:12,lineHeight:1.6}}>Pega la URL de un video de <strong>TikTok</strong>, <strong>Instagram</strong>, <strong>YouTube</strong>, o cualquier web con la receta.</p>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={urlVal} onChange={e=>setUrlVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&importURL()} placeholder="https://www.tiktok.com/@chef/video/..." style={inp({flex:1,fontSize:12})} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
                <button onClick={importURL} disabled={loading} style={bv("p",{padding:"9px 16px",borderRadius:6,opacity:loading?.6:1})} onMouseOver={e=>{if(!loading)e.currentTarget.style.background=G.blueHov;}} onMouseOut={e=>e.currentTarget.style.background=G.blue}>{loading?"⏳":"Extraer"}</button>
              </div>
            </div>
          )}

          {/* ─── TEXT ─── */}
          {tab==="text"&&(
            <div>
              <div style={{background:G.blueTint,border:`1px solid ${G.blue}22`,borderRadius:8,padding:"10px 14px",marginBottom:12}}>
                <p style={{fontFamily:FB,fontSize:11,color:G.blue,margin:0,lineHeight:1.5}}>💡 <strong>Carga múltiple por texto:</strong> pega varias recetas en el campo de abajo separadas por <code>---</code> y las importará todas de una sola vez.</p>
              </div>
              <textarea value={textVal} onChange={e=>setTextVal(e.target.value)} rows={9} placeholder={"Receta 1: Ceviche de corvina\nIngredientes: 500g corvina...\n\n---\n\nReceta 2: Lomo saltado\nIngredientes: 400g lomo..."} style={inp({resize:"vertical",fontSize:12,lineHeight:1.6,marginBottom:8,fontFamily:"monospace"})} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
              <button onClick={importText} disabled={loading||!textVal.trim()} style={bv("p",{padding:"9px 20px",borderRadius:6,width:"100%",opacity:(loading||!textVal.trim())?.5:1})} onMouseOver={e=>{if(!loading&&textVal.trim())e.currentTarget.style.background=G.blueHov;}} onMouseOut={e=>e.currentTarget.style.background=G.blue}>
                {loading?"Estructurando…":textVal.includes("---")?"Importar todas las recetas":"Importar receta"}
              </button>
            </div>
          )}

          {/* Error */}
          {error&&<p style={{color:G.red,fontSize:12,fontFamily:FB,marginTop:12,padding:"8px 12px",background:G.red+"08",borderRadius:6}}>{error}</p>}

          {/* Preview (single) */}
          {preview&&!preview._multi&&(
            <div style={{marginTop:16,border:`1px solid ${G.blue}33`,borderRadius:10,overflow:"hidden"}}>
              <div style={{background:G.blueTint,padding:"12px 16px",borderBottom:`1px solid ${G.blue}22`}}>
                <p style={{fontFamily:FB,fontSize:9,color:G.blue,letterSpacing:2,textTransform:"uppercase",fontWeight:600,margin:"0 0 4px"}}>Receta extraída — revisa y confirma</p>
                <p style={{fontFamily:FH,fontSize:18,color:G.text,margin:0,fontWeight:700}}>{preview.name}</p>
                <p style={{fontFamily:FB,fontSize:11,color:G.textMid,margin:"2px 0 0"}}>{preview.category} · {preview.portions} porciones · {preview.steps?.length||0} pasos</p>
              </div>
              <div style={{padding:"12px 16px",maxHeight:180,overflowY:"auto"}}>
                {(preview.steps||[]).map((s,i)=>(
                  <div key={i} style={{marginBottom:8}}>
                    <p style={{fontFamily:FH,fontSize:13,color:G.text,margin:"0 0 2px",fontWeight:700}}>{i+1}. {s.name}</p>
                    <p style={{fontFamily:FB,fontSize:10,color:G.textMut,margin:0}}>{(s.ingredients||[]).map(x=>x.name).join(", ")}</p>
                  </div>
                ))}
              </div>
              <div style={{padding:"12px 16px",borderTop:`1px solid ${G.brd}`,display:"flex",gap:8}}>
                <button onClick={()=>onImport(preview)} style={bv("p",{padding:"9px 20px",borderRadius:6,flex:1})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>✓ Guardar en repositorio</button>
                <button onClick={()=>setPreview(null)} style={bv("ghost",{padding:"9px 16px",borderRadius:6})} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>Descartar</button>
              </div>
            </div>
          )}
          {preview?._multi&&(
            <div style={{marginTop:12,background:G.green+"0A",border:`1px solid ${G.green}33`,borderRadius:10,padding:"14px 16px",textAlign:"center"}}>
              <p style={{fontFamily:FH,fontSize:18,color:G.green,margin:"0 0 4px",fontWeight:700}}>✅ {preview._count} recetas importadas</p>
              <p style={{fontFamily:FB,fontSize:12,color:G.textMid,margin:0}}>Todas guardadas en tu repositorio</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SectionBox({title,children}){
  return(
    <div style={{border:`1px solid ${G.brd}`,borderRadius:10,marginBottom:16,overflow:"hidden"}}>
      <div style={{background:G.surf,borderBottom:`1px solid ${G.brd}`,padding:"11px 20px"}}>
        <h3 style={{fontFamily:FH,fontSize:14,color:G.text,margin:0,fontWeight:700,letterSpacing:.2}}>{title}</h3>
      </div>
      <div style={{padding:"18px 20px",background:G.w}}>{children}</div>
    </div>
  );
}
function Label({t,req}){return <p style={{fontSize:9,letterSpacing:2,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:6,fontFamily:FB}}>{t}{req&&<span style={{color:G.red}}> *</span>}</p>;}
function ErrMsg({msg}){return msg?<p style={{fontSize:10,color:G.red,marginTop:3,fontFamily:FB}}>{msg}</p>:null;}

function AddRecipe({onSave,onCancel,colls,initialRecipe}){
  const isEdit=!!initialRecipe;
  const fileRef=useRef();
  const[form,setForm]=useState(()=>isEdit
    ?{...initialRecipe,links:(initialRecipe.links||[]),steps:(initialRecipe.steps||[]).map(s=>({...s,id:s.id||gid(),ingredients:(s.ingredients||[]).map(i=>({...i,id:i.id||gid()}))}))}
    :{name:"",category:CATEGORIES[0],portions:4,photo:null,cutlery:[],plating:"",steps:[eStep()],colls:[],links:[]});
  const[errors,setErrors]=useState({});
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handlePhoto=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>upd("photo",ev.target.result);r.readAsDataURL(f);};
  const toggleCut=id=>setForm(p=>({...p,cutlery:p.cutlery.includes(id)?p.cutlery.filter(c=>c!==id):[...p.cutlery,id]}));
  const toggleColl=id=>setForm(p=>({...p,colls:p.colls.includes(id)?p.colls.filter(c=>c!==id):[...p.colls,id]}));
  const addStep=()=>setForm(p=>({...p,steps:[...p.steps,eStep()]}));
  const remStep=sid=>setForm(p=>({...p,steps:p.steps.filter(s=>s.id!==sid)}));
  const updStep=(sid,k,v)=>setForm(p=>({...p,steps:p.steps.map(s=>s.id===sid?{...s,[k]:v}:s)}));
  const addIng=sid=>setForm(p=>({...p,steps:p.steps.map(s=>s.id===sid?{...s,ingredients:[...s.ingredients,eIng()]}:s)}));
  const remIng=(sid,iid)=>setForm(p=>({...p,steps:p.steps.map(s=>s.id===sid?{...s,ingredients:s.ingredients.filter(i=>i.id!==iid)}:s)}));
  const updIng=(sid,iid,k,v)=>setForm(p=>({...p,steps:p.steps.map(s=>s.id===sid?{...s,ingredients:s.ingredients.map(i=>i.id===iid?{...i,[k]:v}:i)}:s)}));
  const validate=()=>{const e={};if(!form.name.trim())e.name="Requerido";if(!form.portions||form.portions<1)e.por="Mínimo 1";form.steps.forEach((s,si)=>{if(!s.name.trim())e[`sn${si}`]="Requerido";s.ingredients.forEach((i,ii)=>{if(!i.name.trim())e[`in${si}_${ii}`]="Requerido";if(!i.quantity||parseFloat(i.quantity)<=0)e[`iq${si}_${ii}`]="Requerido";});});setErrors(e);return Object.keys(e).length===0;};
  return(
    <div style={{maxWidth:900,margin:"0 auto",padding:"40px 32px 80px"}}>
      <p style={{fontFamily:FB,fontSize:10,letterSpacing:3,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:8}}>{isEdit?"Editar Receta":"Nueva Receta"}</p>
      <h2 style={{fontFamily:FH,fontSize:30,color:G.text,margin:"0 0 28px",fontWeight:700,letterSpacing:-.5}}>{isEdit?form.name:"Crear receta"}</h2>
      <SectionBox title="Información General">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
          <div style={{gridColumn:"1/-1"}}><Label t="Nombre" req/><input value={form.name} onChange={e=>upd("name",e.target.value)} style={inp()} onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/><ErrMsg msg={errors.name}/></div>
          <div><Label t="Categoría"/><select value={form.category} onChange={e=>upd("category",e.target.value)} style={inp({cursor:"pointer"})}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><Label t="Porciones" req/><input type="number" min="1" value={form.portions} onChange={e=>upd("portions",parseInt(e.target.value)||1)} style={inp()}/><ErrMsg msg={errors.por}/></div>
        </div>
        <Label t="Cubiertos / Servicio"/>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
          {CUTLERY.map(c=>{const s=form.cutlery.includes(c.id);return(
            <button key={c.id} onClick={()=>toggleCut(c.id)} style={{background:s?G.blueTint:"transparent",color:s?G.blue:G.textMid,border:`1px solid ${s?G.blue:G.brd}`,padding:"5px 12px",borderRadius:20,cursor:"pointer",fontFamily:FB,fontSize:10,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
              <span>{c.icon}</span>{c.label}
            </button>);})}
        </div>
        <Label t="Emplatado"/>
        <textarea value={form.plating} onChange={e=>upd("plating",e.target.value)} rows={3} placeholder="Orden de elementos, temperatura del plato, decoración final…" style={inp({resize:"vertical",lineHeight:1.6})}/>
        {colls.length>0&&<><div style={{marginTop:14}}><Label t="Colecciones"/></div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{colls.map(c=>{const s=form.colls.includes(c.id);return(<button key={c.id} onClick={()=>toggleColl(c.id)} style={{background:s?c.color+"15":"transparent",border:`1px solid ${s?c.color:G.brd}`,color:s?c.color:G.textMut,padding:"4px 11px",borderRadius:20,cursor:"pointer",fontFamily:FB,fontSize:10,fontWeight:600}}>{c.name}</button>);})}</div></>}
      </SectionBox>
      <SectionBox title="Links de referencia">
        {(form.links||[]).map((lnk,i)=>(
          <div key={lnk.id} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={lnk.label} onChange={e=>setForm(p=>({...p,links:p.links.map((l,j)=>j===i?{...l,label:e.target.value}:l)}))}
              placeholder="Etiqueta" style={inp({width:150,fontSize:12,padding:"7px 10px",flexShrink:0})}
              onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
            <input value={lnk.url} onChange={e=>setForm(p=>({...p,links:p.links.map((l,j)=>j===i?{...l,url:e.target.value}:l)}))}
              placeholder="https://…" style={inp({flex:1,fontSize:12,padding:"7px 10px"})}
              onFocus={e=>e.target.style.borderColor=G.blue} onBlur={e=>e.target.style.borderColor=G.brd}/>
            <button onClick={()=>setForm(p=>({...p,links:p.links.filter((_,j)=>j!==i)}))}
              style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontSize:20,padding:"0 4px"}}>×</button>
          </div>
        ))}
        <button onClick={()=>setForm(p=>({...p,links:[...(p.links||[]),{id:gid(),label:"",url:""}]}))}
          style={bv("ghost",{fontSize:11,padding:"6px 14px",borderRadius:6})}
          onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>
          + Agregar link
        </button>
      </SectionBox>
      <SectionBox title="Fotografía">
        <input type="file" accept="image/*" ref={fileRef} onChange={handlePhoto} style={{display:"none"}}/>
        {form.photo
          ?<div style={{position:"relative",display:"inline-block"}}><img src={form.photo} alt="preview" style={{maxWidth:280,maxHeight:200,borderRadius:8,border:`1px solid ${G.brd}`,objectFit:"cover"}}/><button onClick={()=>upd("photo",null)} style={{...bv("ghost",{position:"absolute",top:8,right:8,padding:"3px 8px",fontSize:10,borderRadius:4})}}>✕</button></div>
          :<button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"32px",border:`2px dashed ${G.brd}`,borderRadius:8,background:G.surf,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:G.textMut,transition:"border-color .18s",fontFamily:FB,fontSize:12}}
            onMouseOver={e=>{e.currentTarget.style.borderColor=G.blue;e.currentTarget.style.color=G.blue;}} onMouseOut={e=>{e.currentTarget.style.borderColor=G.brd;e.currentTarget.style.color=G.textMut;}}>
            <span style={{fontSize:24}}>📷</span>Subir foto de la receta<span style={{fontSize:10}}>JPG, PNG, WEBP</span>
          </button>}
      </SectionBox>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{fontFamily:FH,fontSize:22,color:G.text,margin:0,fontWeight:700}}>Pasos de Elaboración</h3>
        <button onClick={addStep} style={bv("p",{padding:"7px 14px",fontSize:11})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>+ Paso</button>
      </div>
      {form.steps.map((step,si)=>(
        <div key={step.id} style={{border:`1px solid ${G.brd}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}>
          <div style={{background:G.surf,borderBottom:`1px solid ${G.brd}`,padding:"10px 18px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{background:G.blue,color:G.w,width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0,fontFamily:FH}}>{si+1}</span>
            <input value={step.name} onChange={e=>updStep(step.id,"name",e.target.value)} placeholder={`Nombre del paso ${si+1}`} style={{...inp({flex:1,background:"transparent",border:"none",fontFamily:FH,fontWeight:700,fontSize:13,padding:"2px 0"})}}/>
            {errors[`sn${si}`]&&<span style={{fontSize:10,color:G.red}}>{errors[`sn${si}`]}</span>}
            {form.steps.length>1&&<button onClick={()=>remStep(step.id)} style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontSize:14}}>✕</button>}
          </div>
          <div style={{padding:"16px 18px",background:G.w}}>
            <table style={{width:"100%",borderCollapse:"collapse",marginBottom:8}}>
              <thead><tr style={{borderBottom:`1px solid ${G.brd}`}}>{["Ingrediente","Cantidad","Unidad","Rend. %",""].map((h,hi)=><th key={hi} style={{textAlign:"left",padding:"4px 6px",fontSize:9,color:G.textMut,fontWeight:600,letterSpacing:.8,textTransform:"uppercase",fontFamily:FB}}>{h}</th>)}</tr></thead>
              <tbody>{step.ingredients.map((ing,ii)=>(
                <tr key={ing.id} style={{borderBottom:`1px solid ${G.brd}`}}>
                  <td style={{padding:"4px 6px",minWidth:140}}><input value={ing.name} onChange={e=>updIng(step.id,ing.id,"name",e.target.value)} placeholder="Ingrediente" style={inp({padding:"5px 8px"})}/><ErrMsg msg={errors[`in${si}_${ii}`]}/></td>
                  <td style={{padding:"4px 6px",width:80}}><input type="number" min="0" value={ing.quantity} onChange={e=>updIng(step.id,ing.id,"quantity",e.target.value)} placeholder="0" style={inp({padding:"5px 8px",textAlign:"right"})}/><ErrMsg msg={errors[`iq${si}_${ii}`]}/></td>
                  <td style={{padding:"4px 6px",width:80}}><select value={ing.unit} onChange={e=>updIng(step.id,ing.id,"unit",e.target.value)} style={inp({padding:"5px 8px",cursor:"pointer"})}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></td>
                  <td style={{padding:"4px 6px",width:100}}><div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" min="1" max="100" value={ing.yieldPct} onChange={e=>updIng(step.id,ing.id,"yieldPct",parseFloat(e.target.value)||100)} style={inp({padding:"5px 8px",textAlign:"right",width:58})}/><span style={{color:G.textMut,fontSize:10,fontFamily:FB}}>%</span></div></td>
                  <td style={{padding:"4px 6px",width:26}}>{step.ingredients.length>1&&<button onClick={()=>remIng(step.id,ing.id)} style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontSize:13}}>✕</button>}</td>
                </tr>
              ))}</tbody>
            </table>
            <button onClick={()=>addIng(step.id)} style={bv("soft",{fontSize:10,padding:"4px 10px",borderRadius:6})}>+ Ingrediente</button>
            <div style={{marginTop:14}}><Label t="Metodología"/>
              <textarea value={step.method} onChange={e=>updStep(step.id,"method",e.target.value)} rows={3} placeholder="Procedimiento y técnica…" style={inp({resize:"vertical",lineHeight:1.7})}/>
            </div>
          </div>
        </div>
      ))}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:24,paddingTop:20,borderTop:`1px solid ${G.brd}`}}>
        <button onClick={onCancel} style={bv("ghost")} onMouseOver={e=>e.currentTarget.style.background=G.surf} onMouseOut={e=>e.currentTarget.style.background=G.w}>Cancelar</button>
        <button onClick={()=>{if(validate())onSave(isEdit?{...form,id:initialRecipe.id}:form);}} style={bv("p")} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>{isEdit?"Guardar Cambios":"Guardar Receta"}</button>
      </div>
    </div>
  );
}

/* ══ ORGANIZE ══ */
function Organize({recipes,colls,setColls,onOpen}){
  const[newName,setNewName]=useState("");
  const[newCol,setNewCol]=useState(COLL_COLORS[0]);
  const addColl=()=>{if(!newName.trim())return;setColls(p=>[...p,{id:gid(),name:newName.trim(),color:newCol}]);setNewName("");};
  const delColl=id=>setColls(p=>p.filter(c=>c.id!==id));
  const uncollected=recipes.filter(r=>!r.colls||r.colls.length===0);
  return(
    <div style={{maxWidth:1100,margin:"0 auto",padding:useMobile()?"16px 12px":"48px 32px"}}>
      <p style={{fontFamily:FB,fontSize:10,letterSpacing:3,textTransform:"uppercase",color:G.blue,fontWeight:600,marginBottom:8}}>Organización</p>
      <h1 style={{fontFamily:FH,fontSize:38,color:G.text,margin:"0 0 4px",fontWeight:700,letterSpacing:-.5}}>Colecciones</h1>
      <p style={{color:G.textMut,fontSize:13,margin:"0 0 32px",fontFamily:FB}}>Organiza tus recetas en carpetas temáticas. Asígnalas desde la vista de detalle de cada receta.</p>
      <div style={{border:`1px solid ${G.brd}`,borderRadius:10,padding:"20px",marginBottom:28,display:"flex",gap:14,alignItems:"flex-end",flexWrap:"wrap",background:G.surf}}>
        <div style={{flex:1,minWidth:160}}><Label t="Nueva Colección"/><input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addColl()} placeholder="Nombre de la colección…" style={inp()}/></div>
        <div><Label t="Color"/><div style={{display:"flex",gap:6}}>{COLL_COLORS.map(c=><button key={c} onClick={()=>setNewCol(c)} style={{width:24,height:24,borderRadius:"50%",background:c,border:newCol===c?`3px solid ${G.text}`:`2px solid transparent`,cursor:"pointer"}}/>)}</div></div>
        <button onClick={addColl} style={bv("p",{padding:"9px 18px"})} onMouseOver={e=>e.currentTarget.style.background=G.blueHov} onMouseOut={e=>e.currentTarget.style.background=G.blue}>Crear</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:18,marginBottom:28}}>
        {colls.map(coll=>{const cr=recipes.filter(r=>r.colls?.includes(coll.id));return(
          <div key={coll.id} style={{border:`1px solid ${G.brd}`,borderRadius:10,overflow:"hidden",background:G.w,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
            <div style={{background:coll.color+"10",borderBottom:`1px solid ${coll.color}30`,padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:coll.color,flexShrink:0}}/>
              <span style={{fontFamily:FH,fontSize:17,color:G.text,flex:1,fontWeight:700}}>{coll.name}</span>
              <span style={{fontSize:10,color:G.textMut,fontFamily:FB}}>{cr.length} receta{cr.length!==1?"s":""}</span>
              <button onClick={()=>delColl(coll.id)} style={{background:"none",border:"none",color:G.textMut,cursor:"pointer",fontSize:13}}>✕</button>
            </div>
            <div style={{padding:"12px 18px",display:"flex",flexDirection:"column",gap:4,minHeight:56}}>
              {cr.length===0&&<p style={{color:G.textMut,fontSize:11,margin:0,fontStyle:"italic",fontFamily:FB}}>Sin recetas asignadas</p>}
              {cr.map(r=><button key={r.id} onClick={()=>onOpen(r.id)} style={{background:"none",border:"none",textAlign:"left",cursor:"pointer",padding:"5px 0",color:G.textMid,fontFamily:FB,fontSize:11,borderBottom:`1px solid ${G.brd}`,display:"flex",justifyContent:"space-between"}} onMouseOver={e=>e.currentTarget.style.color=G.blue} onMouseOut={e=>e.currentTarget.style.color=G.textMid}><span>{r.name}</span><span style={{fontSize:9,color:G.textMut}}>{r.category}</span></button>)}
            </div>
          </div>
        );})}
      </div>
      {uncollected.length>0&&(
        <div style={{border:`1px solid ${G.brd}`,borderRadius:10,overflow:"hidden",background:G.w}}>
          <div style={{background:G.surf,borderBottom:`1px solid ${G.brd}`,padding:"12px 18px"}}><span style={{fontFamily:FH,fontSize:15,color:G.text,fontWeight:700}}>Sin clasificar — {uncollected.length}</span></div>
          <div style={{padding:"12px 18px",display:"flex",flexDirection:"column",gap:4}}>
            {uncollected.map(r=><button key={r.id} onClick={()=>onOpen(r.id)} style={{background:"none",border:"none",textAlign:"left",cursor:"pointer",padding:"5px 0",color:G.textMid,fontFamily:FB,fontSize:11,borderBottom:`1px solid ${G.brd}`,display:"flex",justifyContent:"space-between"}} onMouseOver={e=>e.currentTarget.style.color=G.blue} onMouseOut={e=>e.currentTarget.style.color=G.textMid}><span>{r.name}</span><span style={{fontSize:9,color:G.textMut}}>{r.category}</span></button>)}
          </div>
        </div>
      )}
    </div>
  );
}
